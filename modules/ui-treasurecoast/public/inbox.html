<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inbox — Treasure Coast</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Syne', ui-sans-serif, system-ui, sans-serif; background: #0a0f1a; color: #e2e8f0; height: 100vh; overflow: hidden; }
    a { color: #0ea5e9; text-decoration: none; }

    .inbox { display: flex; height: 100vh; }

    /* Left panel */
    .conv-panel {
      width: 320px; min-width: 320px; height: 100vh;
      background: #0f1722; border-right: 1px solid rgba(255,255,255,0.08);
      display: flex; flex-direction: column;
    }
    .conv-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .conv-header h2 { font-size: 18px; font-weight: 700; }
    .conv-header .back-link { font-size: 13px; color: #64748b; }
    .compose-btn {
      width: 34px; height: 34px; border-radius: 8px; border: none;
      background: #0ea5e9; color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .compose-btn:hover { background: #0284c7; }

    .search-wrap { padding: 8px 16px; }
    .search-wrap input {
      width: 100%; padding: 8px 12px; background: #1a2636; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: #e2e8f0; font-family: inherit; font-size: 13px;
    }
    .search-wrap input:focus { outline: none; border-color: #0ea5e9; }

    .conv-list { flex: 1; overflow-y: auto; }
    .conv-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      cursor: pointer; border-left: 3px solid transparent; transition: all .15s;
    }
    .conv-item:hover { background: rgba(255,255,255,0.03); }
    .conv-item.active { background: rgba(14,165,233,0.06); border-left-color: #0ea5e9; }
    .conv-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: #1e293b;
      flex-shrink: 0; object-fit: cover;
    }
    .conv-avatar-placeholder {
      width: 40px; height: 40px; border-radius: 50%; background: #1e293b;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: #64748b; flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-name.unread { font-weight: 800; color: #fff; }
    .conv-preview { font-size: 12px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .conv-time { font-size: 11px; color: #64748b; }
    .conv-unread-dot { width: 8px; height: 8px; border-radius: 50%; background: #0ea5e9; }

    .conv-empty { text-align: center; padding: 40px 20px; color: #64748b; font-size: 13px; }

    /* Right panel */
    .chat-panel { flex: 1; display: flex; flex-direction: column; height: 100vh; }

    .chat-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #64748b; font-size: 14px; flex-direction: column; gap: 8px;
    }
    .chat-empty-icon { font-size: 48px; opacity: 0.3; }

    .chat-header {
      display: flex; align-items: center; gap: 12px; padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08); background: #0f1722;
    }
    .chat-header-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #1e293b; }
    .chat-header-name { font-size: 15px; font-weight: 700; flex: 1; }
    .chat-header a { font-size: 12px; color: #0ea5e9; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; }

    .msg-date-divider {
      text-align: center; font-size: 11px; color: #64748b;
      margin: 16px 0 8px; position: relative;
    }

    .msg-row { display: flex; margin-bottom: 2px; }
    .msg-row.mine { justify-content: flex-end; }
    .msg-bubble {
      max-width: 70%; padding: 10px 14px; border-radius: 16px;
      font-size: 14px; line-height: 1.4; word-wrap: break-word;
    }
    .msg-row.theirs .msg-bubble { background: #1a2636; border-bottom-left-radius: 4px; }
    .msg-row.mine .msg-bubble { background: #0ea5e9; color: #fff; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 10px; color: #64748b; margin-top: 2px; padding: 0 4px; }
    .msg-row.mine .msg-time { text-align: right; }

    .chat-input-wrap {
      padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.08);
      background: #0f1722; display: flex; gap: 10px; align-items: flex-end;
    }
    .chat-input {
      flex: 1; padding: 10px 14px; background: #1a2636; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; color: #e2e8f0; font-family: inherit; font-size: 14px;
      resize: none; max-height: 100px; min-height: 40px; line-height: 1.4;
    }
    .chat-input:focus { outline: none; border-color: #0ea5e9; }
    .send-btn {
      width: 40px; height: 40px; border-radius: 10px; border: none;
      background: #0ea5e9; color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .send-btn:hover { background: #0284c7; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }

    /* Compose modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #0f1722; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; width: 100%; max-width: 420px; padding: 24px;
    }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal input {
      width: 100%; padding: 10px 14px; background: #1a2636; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: #e2e8f0; font-family: inherit; font-size: 14px; margin-bottom: 12px;
    }
    .modal input:focus { outline: none; border-color: #0ea5e9; }
    .user-results { max-height: 240px; overflow-y: auto; }
    .user-result {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: 8px; cursor: pointer; transition: background .15s;
    }
    .user-result:hover { background: rgba(255,255,255,0.05); }
    .user-result img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #1e293b; }
    .user-result .ur-placeholder {
      width: 36px; height: 36px; border-radius: 50%; background: #1e293b;
      display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #64748b;
    }
    .user-result span { font-size: 14px; font-weight: 600; }
    .no-results { text-align: center; color: #64748b; font-size: 13px; padding: 20px; }

    /* Mobile back button */
    .mobile-back {
      display: none; background: none; border: none; color: #e2e8f0; font-size: 20px;
      cursor: pointer; padding: 4px 8px;
    }

    @media (max-width: 700px) {
      .conv-panel { width: 100%; min-width: 100%; }
      .chat-panel { display: none; width: 100%; }
      .inbox.chat-open .conv-panel { display: none; }
      .inbox.chat-open .chat-panel { display: flex; }
      .mobile-back { display: block; }
    }
  </style>
</head>
<body>

  <div class="inbox" id="inboxWrap">
    <!-- Left: Conversations -->
    <div class="conv-panel">
      <div class="conv-header">
        <div>
          <a href="/" class="back-link">&larr; Home</a>
          <h2>Messages</h2>
        </div>
        <button class="compose-btn" onclick="openCompose()" title="New Message">&#9998;</button>
      </div>
      <div class="search-wrap">
        <input type="text" id="convSearch" placeholder="Search conversations..." oninput="filterConversations()">
      </div>
      <div class="conv-list" id="convList">
        <div class="conv-empty">Loading...</div>
      </div>
    </div>

    <!-- Right: Chat -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty-icon">&#128172;</div>
        <div>Select a conversation to start messaging</div>
      </div>
      <div id="chatActive" style="display:none;flex:1;display:none;flex-direction:column;height:100%;">
        <div class="chat-header" id="chatHeader">
          <button class="mobile-back" onclick="goBackToList()">&larr;</button>
          <img class="chat-header-avatar" id="chatAvatar" src="">
          <div class="chat-header-name" id="chatName"></div>
          <a id="chatProfileLink" href="#">View Profile</a>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-wrap">
          <textarea class="chat-input" id="chatInput" placeholder="Type a message..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#10148;</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Compose Modal -->
  <div class="modal-overlay" id="composeModal" onclick="if(event.target===this)closeCompose()">
    <div class="modal">
      <h3>New Message</h3>
      <input type="text" id="userSearchInput" placeholder="Search by name..." oninput="searchUsers()">
      <div class="user-results" id="userResults">
        <div class="no-results">Type a name to search</div>
      </div>
    </div>
  </div>

<script>
(function() {
  var TOKEN_KEY = 'tc_token';
  var token = localStorage.getItem(TOKEN_KEY);
  var currentUser = null;
  var conversations = [];
  var activeConvId = null;
  var activeOtherUser = null;
  var lastMessageCount = 0;
  var convPollTimer = null;
  var msgPollTimer = null;

  function authHeaders() {
    return token ? { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
  }

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // ── Audio notification ──
  var audioCtx = null;
  function playNotifSound() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
    } catch (e) {}
  }

  // ── Auth check ──
  if (!token) { window.location.href = '/login'; return; }
  fetch('/api/auth/me', { headers: authHeaders() })
    .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
    .then(function(user) {
      currentUser = user;
      loadConversations();
      convPollTimer = setInterval(loadConversations, 10000);
      // Check URL params
      var params = new URLSearchParams(window.location.search);
      if (params.get('conv')) {
        openConversation(params.get('conv'));
      } else if (params.get('with')) {
        startNewConversation(params.get('with'));
      } else if (params.get('recipientId')) {
        startNewConversation(params.get('recipientId'));
      }
    })
    .catch(function() { window.location.href = '/login'; });

  // ── Conversations ──
  function loadConversations() {
    fetch('/api/messages', { headers: authHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        conversations = data.conversations || [];
        renderConversations();
      })
      .catch(function() {});
  }

  function renderConversations() {
    var search = (document.getElementById('convSearch').value || '').toLowerCase();
    var filtered = conversations;
    if (search) {
      filtered = conversations.filter(function(c) {
        return (c.other_user_name || '').toLowerCase().indexOf(search) !== -1;
      });
    }
    var list = document.getElementById('convList');
    if (!filtered.length) {
      list.innerHTML = '<div class="conv-empty">' + (search ? 'No matching conversations' : 'No conversations yet') + '</div>';
      return;
    }
    list.innerHTML = filtered.map(function(c) {
      var isActive = c.conversation_id === activeConvId;
      var hasUnread = c.unread_count > 0;
      var avatarHtml = c.other_user_avatar
        ? '<img class="conv-avatar" src="' + esc(c.other_user_avatar) + '">'
        : '<div class="conv-avatar-placeholder">' + esc((c.other_user_name || '?')[0].toUpperCase()) + '</div>';
      return '<div class="conv-item' + (isActive ? ' active' : '') + '" data-conv="' + esc(c.conversation_id) + '">'
        + avatarHtml
        + '<div class="conv-info">'
        + '<div class="conv-name' + (hasUnread ? ' unread' : '') + '">' + esc(c.other_user_name || 'User') + '</div>'
        + '<div class="conv-preview">' + esc(c.last_message || '') + '</div>'
        + '</div>'
        + '<div class="conv-meta">'
        + '<div class="conv-time">' + relTime(c.last_message_at) + '</div>'
        + (hasUnread ? '<div class="conv-unread-dot"></div>' : '')
        + '</div>'
        + '</div>';
    }).join('');

    list.querySelectorAll('.conv-item').forEach(function(el) {
      el.addEventListener('click', function() {
        openConversation(el.getAttribute('data-conv'));
      });
    });
  }

  function filterConversations() { renderConversations(); }
  window.filterConversations = filterConversations;

  function relTime(dateStr) {
    if (!dateStr) return '';
    var now = Date.now();
    var d = new Date(dateStr).getTime();
    var diff = Math.floor((now - d) / 1000);
    if (diff < 60) return 'now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h';
    var dt = new Date(dateStr);
    var today = new Date();
    if (dt.toDateString() === new Date(today - 86400000).toDateString()) return 'Yesterday';
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  // ── Open conversation ──
  function openConversation(convId) {
    activeConvId = convId;
    // Find conversation data
    var conv = conversations.find(function(c) { return c.conversation_id === convId; });
    if (conv) {
      activeOtherUser = { id: conv.other_user_id, name: conv.other_user_name, avatar_url: conv.other_user_avatar };
    }
    renderConversations(); // Update active highlight
    document.getElementById('chatEmpty').style.display = 'none';
    var chatActive = document.getElementById('chatActive');
    chatActive.style.display = 'flex';
    chatActive.style.flexDirection = 'column';
    chatActive.style.height = '100%';

    // Mobile: show chat
    document.getElementById('inboxWrap').classList.add('chat-open');

    loadMessages(convId);
    markRead(convId);

    // Start message polling
    if (msgPollTimer) clearInterval(msgPollTimer);
    msgPollTimer = setInterval(function() { loadMessages(convId); }, 5000);
  }

  function loadMessages(convId) {
    fetch('/api/messages/' + encodeURIComponent(convId), { headers: authHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.messages) return;
        // Update header
        var otherUser = data.other_user || activeOtherUser || {};
        activeOtherUser = otherUser;
        var avatar = document.getElementById('chatAvatar');
        if (otherUser.avatar_url) { avatar.src = otherUser.avatar_url; } else { avatar.src = ''; }
        document.getElementById('chatName').textContent = otherUser.name || 'User';
        document.getElementById('chatProfileLink').href = '/profile/' + (otherUser.id || '');

        // Check for new messages
        if (data.messages.length > lastMessageCount && lastMessageCount > 0) {
          var lastMsg = data.messages[data.messages.length - 1];
          if (lastMsg.sender_id !== currentUser.id) {
            playNotifSound();
          }
        }
        lastMessageCount = data.messages.length;

        renderMessages(data.messages);
      })
      .catch(function() {});
  }

  function renderMessages(messages) {
    var container = document.getElementById('chatMessages');
    var wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
    var html = '';
    var lastDate = '';
    messages.forEach(function(m) {
      var d = new Date(m.created_at);
      var dateStr = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
      if (dateStr !== lastDate) {
        html += '<div class="msg-date-divider">' + dateStr + '</div>';
        lastDate = dateStr;
      }
      var isMine = m.sender_id === currentUser.id;
      var time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      html += '<div class="msg-row ' + (isMine ? 'mine' : 'theirs') + '">'
        + '<div>'
        + '<div class="msg-bubble">' + esc(m.message) + '</div>'
        + '<div class="msg-time">' + time + '</div>'
        + '</div></div>';
    });
    container.innerHTML = html;
    if (wasAtBottom || lastMessageCount <= messages.length) {
      container.scrollTop = container.scrollHeight;
    }
  }

  function markRead(convId) {
    fetch('/api/messages/' + encodeURIComponent(convId) + '/read', {
      method: 'PUT',
      headers: authHeaders()
    }).catch(function() {});
  }

  // ── Send message ──
  function sendMessage() {
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text || !activeOtherUser) return;
    input.value = '';
    autoResize(input);
    fetch('/api/messages', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ recipientId: activeOtherUser.id, message: text })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok && data.conversation_id) {
        if (!activeConvId) activeConvId = data.conversation_id;
        loadMessages(activeConvId);
        loadConversations();
      }
    })
    .catch(function() {});
  }
  window.sendMessage = sendMessage;

  // ── Chat input handling ──
  var chatInput = document.getElementById('chatInput');
  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  chatInput.addEventListener('input', function() { autoResize(this); });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  // ── Mobile back ──
  function goBackToList() {
    document.getElementById('inboxWrap').classList.remove('chat-open');
    activeConvId = null;
    if (msgPollTimer) clearInterval(msgPollTimer);
    document.getElementById('chatActive').style.display = 'none';
    document.getElementById('chatEmpty').style.display = 'flex';
    renderConversations();
  }
  window.goBackToList = goBackToList;

  // ── Compose modal ──
  var searchTimer = null;
  function openCompose() {
    document.getElementById('composeModal').classList.add('active');
    document.getElementById('userSearchInput').value = '';
    document.getElementById('userResults').innerHTML = '<div class="no-results">Type a name to search</div>';
    setTimeout(function() { document.getElementById('userSearchInput').focus(); }, 100);
  }
  window.openCompose = openCompose;

  function closeCompose() {
    document.getElementById('composeModal').classList.remove('active');
  }
  window.closeCompose = closeCompose;

  function searchUsers() {
    var q = document.getElementById('userSearchInput').value.trim();
    if (q.length < 2) {
      document.getElementById('userResults').innerHTML = '<div class="no-results">Type at least 2 characters</div>';
      return;
    }
    if (searchTimer) clearTimeout(searchTimer);
    searchTimer = setTimeout(function() {
      fetch('/api/users/search?q=' + encodeURIComponent(q), { headers: authHeaders() })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var users = data.users || [];
          if (!users.length) {
            document.getElementById('userResults').innerHTML = '<div class="no-results">No users found</div>';
            return;
          }
          document.getElementById('userResults').innerHTML = users.map(function(u) {
            var av = u.avatar_url
              ? '<img src="' + esc(u.avatar_url) + '">'
              : '<div class="ur-placeholder">' + esc((u.name || '?')[0].toUpperCase()) + '</div>';
            return '<div class="user-result" data-uid="' + esc(u.id) + '">' + av + '<span>' + esc(u.name) + '</span></div>';
          }).join('');
          document.getElementById('userResults').querySelectorAll('.user-result').forEach(function(el) {
            el.addEventListener('click', function() {
              startNewConversation(el.getAttribute('data-uid'));
              closeCompose();
            });
          });
        })
        .catch(function() {});
    }, 300);
  }
  window.searchUsers = searchUsers;

  function startNewConversation(recipientId) {
    // Check if conversation already exists
    var existing = conversations.find(function(c) { return c.other_user_id === recipientId; });
    if (existing) {
      openConversation(existing.conversation_id);
      return;
    }
    // Set up for new conversation
    fetch('/api/profile/' + recipientId, { headers: authHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(user) {
        activeOtherUser = { id: user.id, name: user.name, avatar_url: user.avatar_url };
        activeConvId = null;
        lastMessageCount = 0;
        document.getElementById('chatEmpty').style.display = 'none';
        var chatActive = document.getElementById('chatActive');
        chatActive.style.display = 'flex';
        chatActive.style.flexDirection = 'column';
        chatActive.style.height = '100%';
        document.getElementById('inboxWrap').classList.add('chat-open');
        var avatar = document.getElementById('chatAvatar');
        if (user.avatar_url) { avatar.src = user.avatar_url; } else { avatar.src = ''; }
        document.getElementById('chatName').textContent = user.name || 'User';
        document.getElementById('chatProfileLink').href = '/profile/' + user.id;
        document.getElementById('chatMessages').innerHTML = '<div class="conv-empty">Start the conversation!</div>';
        document.getElementById('chatInput').focus();
      })
      .catch(function() {});
  }

})();
</script>
</body>
</html>
