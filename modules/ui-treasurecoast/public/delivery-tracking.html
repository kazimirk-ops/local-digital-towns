<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Tracking — Treasure Coast</title>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #0a0e1a; color: #e2e8f0; margin: 0; }
    .track-container { max-width: 500px; margin: 40px auto; padding: 20px; }
    .track-header { text-align: center; margin-bottom: 30px; }
    .track-header h1 { font-size: 24px; color: #10b981; margin: 0 0 4px; }
    .track-header p { color: #94a3b8; font-size: 14px; margin: 0; }
    .status-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
    .status-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; }
    .status-row:last-child { border-bottom: none; }
    .status-label { color: #94a3b8; font-size: 14px; }
    .status-value { color: #f1f5f9; font-size: 14px; font-weight: 600; }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .status-pending { background: #334155; color: #94a3b8; }
    .status-pickup { background: #1e3a5f; color: #60a5fa; }
    .status-enroute { background: #064e3b; color: #10b981; }
    .status-delivered { background: #14532d; color: #4ade80; }
    .status-canceled { background: #3b1111; color: #f87171; }
    .refresh-btn { display: block; width: 100%; margin-top: 16px; padding: 12px; background: #10b981; color: #fff; border: none; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; }
    .refresh-btn:hover { background: #059669; }
    a { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="track-container">
    <div class="track-header">
      <h1>&#127754; Treasure Coast Express</h1>
      <p>Delivery Tracking</p>
    </div>
    <div class="status-card" id="trackingCard">
      <div style="text-align:center; color:#94a3b8; padding:20px;">Loading...</div>
    </div>
    <button class="refresh-btn" id="refreshBtn">Refresh Status</button>
    <div style="text-align:center; margin-top:16px;"><a href="/" style="font-size:13px; text-decoration:none;">&larr; Back to Treasure Coast</a></div>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var orderId = params.get('orderId');
      var token = localStorage.getItem('tc_token');

      function statusBadge(status) {
        var s = (status || 'pending').toLowerCase();
        var cls = 'status-pending';
        var label = status || 'Pending';
        if (s.indexOf('pickup') !== -1) { cls = 'status-pickup'; label = 'Courier heading to store'; }
        else if (s.indexOf('dropoff') !== -1 || s.indexOf('enroute') !== -1) { cls = 'status-enroute'; label = 'On the way to you'; }
        else if (s.indexOf('delivered') !== -1) { cls = 'status-delivered'; label = 'Delivered!'; }
        else if (s.indexOf('cancel') !== -1 || s.indexOf('return') !== -1) { cls = 'status-canceled'; label = 'Canceled'; }
        else if (s === 'pending') { label = 'Preparing'; }
        return '<span class="status-badge ' + cls + '">' + label + '</span>';
      }

      function loadTracking() {
        if (!orderId) {
          document.getElementById('trackingCard').innerHTML = '<div style="text-align:center;color:#94a3b8;padding:20px;">No order ID provided</div>';
          return;
        }
        var headers = {};
        if (token) headers['Authorization'] = 'Bearer ' + token;
        fetch('/api/delivery/order/' + orderId + '/tracking', { headers: headers })
          .then(function(r) {
            if (!r.ok) throw new Error('Could not load tracking');
            return r.json();
          })
          .then(function(data) {
            var card = document.getElementById('trackingCard');
            var html = '<div class="status-row"><span class="status-label">Order</span><span class="status-value">#' + (data.orderId || '').toString().substring(0, 8) + '</span></div>'
              + '<div class="status-row"><span class="status-label">Status</span>' + statusBadge(data.deliveryStatus) + '</div>'
              + '<div class="status-row"><span class="status-label">Delivery To</span><span class="status-value">' + (data.deliveryAddress || '\u2014') + '</span></div>';
            if (data.deliveryFeeCents) {
              html += '<div class="status-row"><span class="status-label">Delivery Fee</span><span class="status-value">$' + (data.deliveryFeeCents / 100).toFixed(2) + '</span></div>';
            }
            if (data.uberDeliveryId) {
              html += '<div class="status-row"><span class="status-label">Tracking ID</span><span class="status-value" style="font-size:12px;">' + data.uberDeliveryId + '</span></div>';
            }
            card.innerHTML = html;
          })
          .catch(function(e) {
            document.getElementById('trackingCard').innerHTML = '<div style="text-align:center;color:#f87171;padding:20px;">' + e.message + '</div>';
          });
      }

      document.getElementById('refreshBtn').addEventListener('click', loadTracking);
      loadTracking();
      setInterval(loadTracking, 15000);
    })();
  </script>
</body>
</html>
