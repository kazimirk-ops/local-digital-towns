<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Messages — Treasure Coast</title>
  <style>
    :root { --primary: #0ea5e9; --accent: #00E5FF; --bg: #0a0f1a; --panel: #111827; --border: #1e293b; --text: #e2e8f0; --muted: #64748b; --radius: 12px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    a { color: var(--primary); text-decoration: none; }

    .topbar { background: rgba(10,15,26,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .topbar-back { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
    .topbar-back:hover { color: var(--text); background: var(--panel); }
    .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }

    .auth-notice { max-width: 500px; margin: 80px auto; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; text-align: center; }
    .auth-notice .btn { display: inline-block; margin-top: 12px; padding: 10px 28px; background: var(--primary); color: #fff; border-radius: 8px; font-weight: 700; font-size: 14px; border: none; cursor: pointer; }

    .dm-layout { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    /* Sidebar */
    .dm-sidebar { width: 340px; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .dm-sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .dm-sidebar-header h3 { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
    .dm-search { width: 100%; padding: 8px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; }
    .dm-search:focus { border-color: var(--primary); }
    .dm-conv-list { flex: 1; overflow-y: auto; }

    .dm-conv-item { display: flex; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
    .dm-conv-item:hover, .dm-conv-item.active { background: #1e293b; }
    .dm-conv-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: 16px; flex-shrink: 0; overflow: hidden; }
    .dm-conv-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .dm-conv-info { flex: 1; min-width: 0; }
    .dm-conv-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
    .dm-conv-preview { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dm-conv-listing { font-size: 11px; color: var(--primary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dm-conv-meta { text-align: right; flex-shrink: 0; }
    .dm-conv-time { font-size: 11px; color: var(--muted); }
    .dm-conv-unread { display: inline-block; background: var(--primary); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 10px; margin-top: 4px; }
    .dm-empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 14px; line-height: 1.6; }

    /* Chat area */
    .dm-chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .dm-chat-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--panel); flex-shrink: 0; }
    .dm-chat-back { display: none; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 2px 6px; }
    .dm-chat-avatar-wrap { position: relative; flex-shrink: 0; }
    .dm-chat-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: 16px; flex-shrink: 0; overflow: hidden; }
    .dm-chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .online-dot { position: absolute; bottom: 1px; right: 1px; width: 10px; height: 10px; background: #10b981; border: 2px solid var(--panel); border-radius: 50%; }
    .dm-chat-name { font-weight: 700; font-size: 15px; flex: 1; }
    .dm-chat-name a { color: var(--primary); font-size: 12px; font-weight: 400; margin-left: 8px; }
    .dm-chat-listing-link { font-size: 12px; color: var(--muted); }

    .dm-chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 6px; }
    .dm-chat-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; }

    /* Listing context card */
    .listing-context { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; display: flex; gap: 12px; align-items: center; margin-bottom: 16px; cursor: pointer; }
    .listing-context img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; }
    .listing-context-info { flex: 1; }
    .listing-context-title { font-size: 13px; font-weight: 600; }
    .listing-context-price { font-size: 14px; font-weight: 700; color: var(--accent); }

    /* Bubbles */
    .msg-row { display: flex; align-items: flex-end; gap: 8px; max-width: 80%; }
    .msg-row.sent { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.received { align-self: flex-start; }
    .msg-avatar-sm { width: 28px; height: 28px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
    .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-break: break-word; position: relative; }
    .msg-row.sent .msg-bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
    .msg-row.received .msg-bubble { background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg-time { font-size: 10px; color: var(--muted); margin-top: 2px; opacity: 0.7; }
    .msg-row.sent .msg-time { text-align: right; }
    .date-divider { text-align: center; color: var(--muted); font-size: 12px; padding: 12px 0; align-self: center; }
    .date-divider span { background: var(--bg); padding: 0 12px; }

    /* Compose */
    .dm-compose { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; background: var(--panel); flex-shrink: 0; }
    .dm-compose textarea { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; outline: none; font-family: inherit; resize: none; min-height: 44px; max-height: 120px; line-height: 1.4; overflow-y: auto; }
    .dm-compose textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(14,165,233,0.3); }
    .dm-compose button { padding: 10px 24px; border-radius: 20px; background: var(--primary); color: #fff; border: none; font-weight: 700; font-size: 15px; cursor: pointer; flex-shrink: 0; }
    .dm-compose button:hover { background: #0284c7; }
    .dm-compose button:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 700px) {
      .dm-sidebar { width: 100%; }
      .dm-chat { display: none; }
      .dm-layout.chat-open .dm-sidebar { display: none; }
      .dm-layout.chat-open .dm-chat { display: flex; }
      .dm-chat-back { display: block; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="topbar-back" onclick="window.location.href='/'">&#8592;</button>
    <span class="topbar-title">Messages</span>
  </div>

  <div id="authNotice" class="auth-notice" style="display:none">
    <h2 style="font-size:20px;margin-bottom:8px;">Sign In to Message</h2>
    <p style="color:var(--muted);font-size:14px;">You need to be logged in to send and receive messages.</p>
    <a href="/login" class="btn">Sign In</a>
  </div>

  <div id="dmLayout" class="dm-layout" style="display:none">
    <div class="dm-sidebar">
      <div class="dm-sidebar-header">
        <h3>Messages</h3>
        <input class="dm-search" id="convSearch" placeholder="Search conversations..." oninput="filterConversations()">
      </div>
      <div class="dm-conv-list" id="convList">
        <div class="dm-empty" id="convEmpty">No messages yet.<br>Browse listings to start a conversation.</div>
      </div>
    </div>
    <div class="dm-chat" id="chatArea">
      <div class="dm-chat-placeholder" id="chatPlaceholder">
        <div style="text-align:center;">
          <div style="font-size:64px;margin-bottom:16px;">&#128236;</div>
          <h2 style="font-size:20px;font-weight:700;margin-bottom:8px;">Your Messages</h2>
          <p style="color:var(--muted);font-size:14px;">Select a conversation to start chatting</p>
        </div>
      </div>
      <div id="chatContent" style="display:none;flex:1;flex-direction:column;">
        <div class="dm-chat-header" id="chatHeader">
          <button class="dm-chat-back" onclick="showSidebar()">&#8592;</button>
          <div class="dm-chat-avatar-wrap">
            <div class="dm-chat-avatar" id="chatAvatar"></div>
            <span class="online-dot" id="chatOnlineDot" style="display:none;"></span>
          </div>
          <div class="dm-chat-name" id="chatName"></div>
          <div class="dm-chat-listing-link" id="chatListingLink"></div>
        </div>
        <div class="dm-chat-messages" id="chatMessages"></div>
        <div class="dm-compose">
          <textarea id="msgInput" placeholder="Type a message..." rows="1" oninput="autoGrow(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
          <button onclick="sendMessage()" id="sendBtn" disabled>Send &#10148;</button>
        </div>
      </div>
    </div>
  </div>

<script>
var token = localStorage.getItem('tc_token');
var authHeaders = token ? { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
var currentUserId = null;
var activeConvId = null;
var allConversations = [];
var pollInterval = null;
var msgPollInterval = null;

if (!token) {
  document.getElementById('authNotice').style.display = 'block';
} else {
  document.getElementById('dmLayout').style.display = 'flex';
  init();
}

async function init() {
  try {
    var res = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) { document.getElementById('authNotice').style.display = 'block'; document.getElementById('dmLayout').style.display = 'none'; return; }
    var me = await res.json();
    currentUserId = me.id;
  } catch(e) {
    document.getElementById('authNotice').style.display = 'block';
    document.getElementById('dmLayout').style.display = 'none';
    return;
  }

  await loadConversations();

  // Check URL params
  var params = new URLSearchParams(window.location.search);
  var conv = params.get('conv');
  var recipientId = params.get('recipientId');
  var listingId = params.get('listingId');
  var prefillMsg = params.get('msg');

  if (conv) {
    openConversation(conv);
  } else if (recipientId) {
    // Start or open conversation with recipient
    await startConversation(recipientId, listingId, prefillMsg);
  }

  // Poll conversations
  pollInterval = setInterval(loadConversations, 15000);
}

async function startConversation(recipientId, listingId, prefillMsg) {
  try {
    var initialMsg = prefillMsg || 'Hi! I\'m interested.';
    // Just create the conversation ID and open it
    var a = currentUserId < recipientId ? currentUserId : recipientId;
    var b = currentUserId < recipientId ? recipientId : currentUserId;
    var convId = 'conv_' + a + '_' + b;

    // Send initial message to create conversation
    await fetch('/api/messages', {
      method: 'POST',
      headers: authHeaders,
      body: JSON.stringify({ recipientId: recipientId, message: initialMsg, listingId: listingId || null })
    }).catch(function() {});

    await loadConversations();
    openConversation(convId);
  } catch(e) { console.error(e); }
}

async function loadConversations() {
  try {
    var res = await fetch('/api/messages', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) return;
    var data = await res.json();
    allConversations = data.conversations || [];
    renderConversations(allConversations);
  } catch(e) {}
}

function renderConversations(convos) {
  var list = document.getElementById('convList');
  var empty = document.getElementById('convEmpty');
  if (!convos || !convos.length) {
    empty.style.display = 'block';
    list.querySelectorAll('.dm-conv-item').forEach(function(el) { el.remove(); });
    return;
  }
  empty.style.display = 'none';

  var html = convos.map(function(c) {
    var initial = (c.other_user_name || '?')[0].toUpperCase();
    var time = c.last_message_at ? formatTime(c.last_message_at) : '';
    var isActive = c.conversation_id === activeConvId;
    var listingLine = c.listing_title ? '<div class="dm-conv-listing">Re: ' + esc(c.listing_title) + '</div>' : '';
    return '<div class="dm-conv-item' + (isActive ? ' active' : '') + '" data-convid="' + c.conversation_id + '" onclick="openConversation(\'' + c.conversation_id + '\')">'
      + '<div class="dm-conv-avatar">'
      + (c.other_user_avatar ? '<img src="' + esc(c.other_user_avatar) + '">' : initial)
      + '</div>'
      + '<div class="dm-conv-info">'
      + '<div class="dm-conv-name">' + esc(c.other_user_name || 'User') + '</div>'
      + '<div class="dm-conv-preview">' + esc(c.last_message || 'No messages yet') + '</div>'
      + listingLine
      + '</div>'
      + '<div class="dm-conv-meta">'
      + '<div class="dm-conv-time">' + time + '</div>'
      + (c.unread_count > 0 ? '<div class="dm-conv-unread">' + c.unread_count + '</div>' : '')
      + '</div></div>';
  }).join('');
  // Keep empty element, replace rest
  list.innerHTML = '<div class="dm-empty" id="convEmpty" style="display:none">No messages yet.<br>Browse listings to start a conversation.</div>' + html;
}

function filterConversations() {
  var q = document.getElementById('convSearch').value.toLowerCase().trim();
  if (!q) { renderConversations(allConversations); return; }
  var filtered = allConversations.filter(function(c) {
    return (c.other_user_name || '').toLowerCase().includes(q) || (c.last_message || '').toLowerCase().includes(q) || (c.listing_title || '').toLowerCase().includes(q);
  });
  renderConversations(filtered);
}

async function openConversation(convId) {
  activeConvId = convId;
  document.getElementById('chatPlaceholder').style.display = 'none';
  var cc = document.getElementById('chatContent');
  cc.style.display = 'flex';
  document.getElementById('dmLayout').classList.add('chat-open');
  document.getElementById('msgInput').value = '';
  document.getElementById('sendBtn').disabled = true;

  // Highlight active
  document.querySelectorAll('.dm-conv-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.convid === convId);
  });

  try {
    var res = await fetch('/api/messages/' + convId, { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) return;
    var data = await res.json();

    // Mark as read
    fetch('/api/messages/' + convId + '/read', { method: 'PUT', headers: authHeaders }).catch(function() {});

    renderChat(data);
  } catch(e) { console.error(e); }

  history.replaceState(null, '', '/messages?conv=' + convId);
  document.getElementById('msgInput').focus();

  // Start polling messages for this conversation
  if (msgPollInterval) clearInterval(msgPollInterval);
  msgPollInterval = setInterval(function() { refreshMessages(convId); }, 15000);
}

async function refreshMessages(convId) {
  if (activeConvId !== convId) return;
  try {
    var res = await fetch('/api/messages/' + convId, { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) return;
    var data = await res.json();
    var container = document.getElementById('chatMessages');
    var wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 50;
    renderChatMessages(data.messages);
    if (wasAtBottom) container.scrollTop = container.scrollHeight;
    fetch('/api/messages/' + convId + '/read', { method: 'PUT', headers: authHeaders }).catch(function() {});
  } catch(e) {}
}

function renderChat(data) {
  var other = data.other_user;
  var conv = data.conversation;

  // Header
  var avatarEl = document.getElementById('chatAvatar');
  if (other && other.avatar_url) {
    avatarEl.innerHTML = '<img src="' + esc(other.avatar_url) + '">';
  } else {
    avatarEl.textContent = (other?.name || '?')[0].toUpperCase();
  }

  // Online dot
  var onlineDot = document.getElementById('chatOnlineDot');
  if (other && other.last_active_at) {
    var activeAgo = Date.now() - new Date(other.last_active_at).getTime();
    onlineDot.style.display = activeAgo < 300000 ? 'block' : 'none';
  } else {
    onlineDot.style.display = 'none';
  }

  var nameEl = document.getElementById('chatName');
  nameEl.innerHTML = esc(other?.name || 'User') + (other ? ' <a href="/profile/' + other.id + '">View Profile</a>' : '');

  // Listing link
  var listingLink = document.getElementById('chatListingLink');
  if (conv.listing_id) {
    listingLink.innerHTML = '<a href="/listing?id=' + conv.listing_id + '">View Listing</a>';
    // Fetch listing context card
    fetch('/api/listings/' + conv.listing_id).then(function(r) { return r.ok ? r.json() : null; })
      .then(function(listing) {
        if (!listing) return;
        var photos = [];
        try { photos = typeof listing.photos === 'string' ? JSON.parse(listing.photos) : (listing.photos || []); } catch(e) {}
        var imgHtml = photos.length > 0 ? '<img src="' + esc(photos[0]) + '">' : '';
        var ctxHtml = '<div class="listing-context" onclick="window.location.href=\'/listing?id=' + conv.listing_id + '\'">'
          + imgHtml
          + '<div class="listing-context-info">'
          + '<div class="listing-context-title">' + esc(listing.title) + '</div>'
          + '<div class="listing-context-price">$' + parseFloat(listing.price || 0).toFixed(2) + '</div>'
          + '</div></div>';
        var container = document.getElementById('chatMessages');
        container.insertAdjacentHTML('afterbegin', ctxHtml);
      }).catch(function() {});
  } else {
    listingLink.innerHTML = '';
  }

  renderChatMessages(data.messages);

  // Scroll to bottom
  var container = document.getElementById('chatMessages');
  container.scrollTop = container.scrollHeight;

  // Enable send button handler
  document.getElementById('msgInput').oninput = function() {
    autoGrow(this);
    document.getElementById('sendBtn').disabled = !this.value.trim();
  };

  // Refresh sidebar unreads
  loadConversations();
}

function renderChatMessages(messages) {
  var container = document.getElementById('chatMessages');
  if (!messages || !messages.length) {
    container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px">Start the conversation</div>';
    return;
  }
  var lastDateStr = '';
  var html = '';
  messages.forEach(function(m) {
    var d = new Date(m.created_at);
    var dateStr = getDateLabel(d);
    if (dateStr !== lastDateStr) {
      html += '<div class="date-divider"><span>' + dateStr + '</span></div>';
      lastDateStr = dateStr;
    }
    var isSent = m.sender_id === currentUserId;
    var initial = (m.sender_name || '?')[0].toUpperCase();
    var time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    html += '<div class="msg-row ' + (isSent ? 'sent' : 'received') + '">'
      + (!isSent ? '<div class="msg-avatar-sm">' + initial + '</div>' : '')
      + '<div><div class="msg-bubble">' + esc(m.message) + '</div>'
      + '<div class="msg-time">' + time + '</div></div></div>';
  });
  container.innerHTML = html;
}

function getDateLabel(d) {
  var now = new Date();
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var msgDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  var diff = today - msgDay;
  if (diff === 0) return 'Today';
  if (diff === 86400000) return 'Yesterday';
  return d.toLocaleDateString([], { month: 'long', day: 'numeric' });
}

async function sendMessage() {
  if (!activeConvId) return;
  var input = document.getElementById('msgInput');
  var text = input.value.trim();
  if (!text) return;

  // Find recipient from conversation
  var conv = allConversations.find(function(c) { return c.conversation_id === activeConvId; });
  var recipientId = conv ? conv.other_user_id : null;
  if (!recipientId) return;

  document.getElementById('sendBtn').disabled = true;

  try {
    var res = await fetch('/api/messages', {
      method: 'POST',
      headers: authHeaders,
      body: JSON.stringify({ recipientId: recipientId, message: text })
    });
    if (res.ok) {
      input.value = '';
      input.style.height = '40px';
      await refreshMessages(activeConvId);
      var container = document.getElementById('chatMessages');
      container.scrollTop = container.scrollHeight;
      loadConversations();
    }
  } catch(e) { console.error(e); }
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function showSidebar() {
  document.getElementById('dmLayout').classList.remove('chat-open');
  if (msgPollInterval) clearInterval(msgPollInterval);
  activeConvId = null;
  history.replaceState(null, '', '/messages');
}

function autoGrow(el) {
  el.style.height = '40px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function formatTime(dt) {
  var d = new Date(dt);
  var now = new Date();
  var diff = now - d;
  if (diff < 60000) return 'now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
  if (diff < 604800000) return Math.floor(diff / 86400000) + 'd';
  return d.toLocaleDateString();
}

function formatTimeFull(dt) {
  var d = new Date(dt);
  var now = new Date();
  var diff = now - d;
  if (diff < 86400000) return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  if (diff < 604800000) return d.toLocaleDateString([], { weekday: 'short' }) + ' ' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  return d.toLocaleDateString();
}

function esc(str) { if (!str) return ''; var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
</script>
</body>
</html>
