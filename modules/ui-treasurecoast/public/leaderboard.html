<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Leaderboard | FloridaLife</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080d14;
      --surface: #101825;
      --border: #1a2d42;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #00b4d8;
      --accent-hover: #0096b7;
      --green: #22c55e;
      --amber: #f59e0b;
      --danger: #ef4444;
      --gold: #f0c040;
      --radius: 12px;
      --heading: 'Barlow Condensed', sans-serif;
      --body: 'Barlow', sans-serif;
    }
    body { font-family: var(--body); background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    .site-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,13,20,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px; display: flex; align-items: center; height: 56px; gap: 24px;
    }
    .nav-brand { font-family: var(--heading); font-weight: 900; font-size: 20px; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .nav-brand:hover { text-decoration: none; }
    .nav-links { display: flex; gap: 6px; margin-left: auto; }
    .nav-links a {
      font-family: var(--body); font-weight: 600; font-size: 13px; color: var(--muted);
      padding: 6px 14px; border-radius: 8px; text-decoration: none; transition: all .15s;
    }
    .nav-links a:hover { color: var(--text); background: rgba(255,255,255,.06); text-decoration: none; }
    .nav-links a.active { color: var(--accent); background: rgba(0,180,216,.1); }

    /* Header */
    .lb-header {
      padding: 48px 20px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .lb-header h1 {
      font-family: var(--heading);
      font-weight: 900;
      font-size: 2.4rem;
      color: #fff;
      margin-bottom: 8px;
    }
    .lb-header .month-display {
      font-size: 1.1rem;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .lb-header .nightly-badge {
      display: inline-block;
      background: rgba(0,180,216,0.12);
      color: var(--accent);
      border: 1px solid rgba(0,180,216,0.25);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
    }

    /* Month nav */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
    }
    .month-nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .month-nav button:hover { background: rgba(255,255,255,.06); }
    .month-nav button:disabled { opacity: 0.3; cursor: default; }
    .month-nav span { font-size: 14px; color: var(--muted); font-weight: 500; min-width: 100px; text-align: center; }

    /* Content */
    .lb-content {
      max-width: 880px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* Track tabs */
    .track-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 0;
      margin-top: 24px;
    }
    .track-tab {
      padding: 14px 20px;
      border: none;
      background: none;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-family: inherit;
      transition: color .15s;
      white-space: nowrap;
    }
    .track-tab:hover { color: var(--text); }
    .track-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Rank list */
    .rank-list { margin-top: 16px; }

    .rank-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border-radius: var(--radius);
      transition: background .15s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .rank-row:hover { background: rgba(255,255,255,0.03); }

    .rank-num {
      font-family: var(--heading);
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--muted);
      min-width: 36px;
      text-align: center;
    }
    .rank-row.rank-1 .rank-num { color: var(--gold); font-size: 1.6rem; }
    .rank-row.rank-2 .rank-num { color: #c0c0c0; }
    .rank-row.rank-3 .rank-num { color: #cd7f32; }

    .rank-row.rank-1 {
      background: rgba(240,192,64,0.06);
      border: 1px solid rgba(240,192,64,0.15);
      border-bottom: 1px solid rgba(240,192,64,0.15);
    }

    .rank-info { flex: 1; min-width: 0; }
    .rank-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rank-badges {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .badge-champion {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(240,192,64,0.15);
      color: var(--gold);
      border: 1px solid rgba(240,192,64,0.3);
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-wins {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,180,216,0.1);
      color: var(--accent);
      border: 1px solid rgba(0,180,216,0.2);
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
    }

    .rank-score-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 160px;
    }
    .score-bar {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width .4s ease;
    }
    .rank-row.rank-1 .score-bar-fill { background: var(--gold); }
    .score-num {
      font-family: var(--heading);
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      min-width: 40px;
      text-align: right;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .empty-state p { font-size: 14px; }

    /* Skeleton */
    .skeleton-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .skeleton-block {
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Footer */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 24px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .site-footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 640px) {
      .lb-header h1 { font-size: 1.8rem; }
      .track-tab { padding: 12px 14px; font-size: 13px; }
      .rank-score-wrap { min-width: 100px; }
      .score-bar { display: none; }
      .nav-links a { padding: 6px 8px; font-size: 12px; }
      .rank-row { gap: 10px; padding: 12px 10px; }
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="nav-brand" id="navBrand">FloridaLife</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/gigs">Services</a>
      <a href="/rides">Rides</a>
      <a href="/junk">Junk</a>
      <a href="/leaderboard" class="active">Leaderboard</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/login" id="navLogin">Login</a>
    </div>
  </nav>

  <div class="lb-header">
    <h1 id="lbTitle">Community Leaderboard</h1>
    <div class="month-display" id="monthDisplay"></div>
    <span class="nightly-badge">Updated nightly</span>
    <div style="margin-top:16px;">
      <select id="citySelect" style="padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;">
        <option value="treasure-coast">Treasure Coast</option>
        <option value="space-coast">Space Coast</option>
        <option value="fort-lauderdale">Fort Lauderdale</option>
        <option value="fort-myers">Fort Myers</option>
        <option value="jacksonville">Jacksonville</option>
        <option value="miami">Miami</option>
        <option value="orlando">Orlando</option>
        <option value="tampa-bay">Tampa Bay</option>
        <option value="west-palm-beach">West Palm Beach</option>
      </select>
    </div>
    <div class="month-nav">
      <button id="prevMonth">&larr; Prev</button>
      <span id="monthLabel"></span>
      <button id="nextMonth">Next &rarr;</button>
    </div>
  </div>

  <div class="lb-content">
    <div class="track-tabs" id="trackTabs">
      <button class="track-tab active" data-track="bst_group">BST Groups</button>
      <button class="track-tab" data-track="rides">Drivers</button>
      <button class="track-tab" data-track="gigs">Gig Workers</button>
      <button class="track-tab" data-track="community">Community</button>
    </div>

    <div class="rank-list" id="rankList">
      <!-- Skeleton loading state -->
      <div class="skeleton-row"><div class="skeleton-block" style="width:36px;height:28px;"></div><div class="skeleton-block" style="width:180px;height:18px;"></div><div style="flex:1;"></div><div class="skeleton-block" style="width:80px;height:18px;"></div></div>
      <div class="skeleton-row"><div class="skeleton-block" style="width:36px;height:28px;"></div><div class="skeleton-block" style="width:150px;height:18px;"></div><div style="flex:1;"></div><div class="skeleton-block" style="width:80px;height:18px;"></div></div>
      <div class="skeleton-row"><div class="skeleton-block" style="width:36px;height:28px;"></div><div class="skeleton-block" style="width:200px;height:18px;"></div><div style="flex:1;"></div><div class="skeleton-block" style="width:80px;height:18px;"></div></div>
      <div class="skeleton-row"><div class="skeleton-block" style="width:36px;height:28px;"></div><div class="skeleton-block" style="width:140px;height:18px;"></div><div style="flex:1;"></div><div class="skeleton-block" style="width:80px;height:18px;"></div></div>
      <div class="skeleton-row"><div class="skeleton-block" style="width:36px;height:28px;"></div><div class="skeleton-block" style="width:170px;height:18px;"></div><div style="flex:1;"></div><div class="skeleton-block" style="width:80px;height:18px;"></div></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>&copy; 2026 FloridaLife &middot; <a href="/">Home</a> &middot; <a href="/gigs">Gigs</a></p>
  </footer>

<script>
  function getTownName() {
    var map = {
      'treasurecoast-fl.com': 'Treasure Coast',
      'space-coastfl.com': 'Space Coast',
      'jacksonville-floridalife.com': 'Jacksonville',
      'miami-floridalife.com': 'Miami',
      'orlando-floridalife.com': 'Orlando',
      'tampa-bay-florida.com': 'Tampa Bay',
      'fortlauderdale-fl.com': 'Fort Lauderdale',
      'fortmyers-fl.com': 'Fort Myers',
      'westpalmbeach-fl.com': 'West Palm Beach',
      'localhost': 'Treasure Coast'
    };
    return map[window.location.hostname] || 'FloridaLife';
  }
  document.getElementById('navBrand').textContent = getTownName();

  var CITIES = [
    { slug: 'treasure-coast',  label: 'Treasure Coast',  domain: 'treasurecoast-fl.com' },
    { slug: 'space-coast',     label: 'Space Coast',     domain: 'space-coastfl.com' },
    { slug: 'fort-lauderdale', label: 'Fort Lauderdale', domain: 'fortlauderdale-fl.com' },
    { slug: 'fort-myers',      label: 'Fort Myers',      domain: 'fortmyers-fl.com' },
    { slug: 'jacksonville',    label: 'Jacksonville',    domain: 'jacksonville-floridalife.com' },
    { slug: 'miami',           label: 'Miami',           domain: 'miami-floridalife.com' },
    { slug: 'orlando',         label: 'Orlando',         domain: 'orlando-floridalife.com' },
    { slug: 'tampa-bay',       label: 'Tampa Bay',       domain: 'tampa-bay-florida.com' },
    { slug: 'west-palm-beach', label: 'West Palm Beach', domain: 'westpalmbeach-fl.com' }
  ];

  // Auto-detect city from hostname
  var domainMap = {
    'treasurecoast-fl.com':'treasure-coast',
    'space-coastfl.com':'space-coast',
    'jacksonville-floridalife.com':'jacksonville',
    'miami-floridalife.com':'miami',
    'orlando-floridalife.com':'orlando',
    'tampa-bay-florida.com':'tampa-bay',
    'fortlauderdale-fl.com':'fort-lauderdale',
    'fortmyers-fl.com':'fort-myers',
    'westpalmbeach-fl.com':'west-palm-beach',
    'localhost':'treasure-coast'
  };
  var hostname = window.location.hostname.replace(/^www\./, '');
  var detectedCity = domainMap[hostname] || 'treasure-coast';

  var CITY = detectedCity;
  var currentTrack = 'bst_group';
  var now = new Date();
  var viewYear = now.getFullYear();
  var viewMonth = now.getMonth() + 1;

  var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // Set dropdown to detected city
  document.getElementById('citySelect').value = CITY;

  function getCityLabel() {
    for (var i = 0; i < CITIES.length; i++) { if (CITIES[i].slug === CITY) return CITIES[i].label; }
    return 'Treasure Coast';
  }

  function updateCityDisplay() {
    var label = getCityLabel();
    document.getElementById('lbTitle').textContent = label + ' Community Leaderboard';
    document.title = 'Community Leaderboard \u2014 ' + label;
  }

  // City selector change
  document.getElementById('citySelect').addEventListener('change', function() {
    CITY = this.value;
    updateCityDisplay();
    loadLeaderboard();
  });

  function esc(str) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(str || ''));
    return d.innerHTML;
  }

  function monthKey() {
    return viewYear + '-' + String(viewMonth).padStart(2, '0');
  }

  function isCurrentMonth() {
    return viewYear === now.getFullYear() && viewMonth === (now.getMonth() + 1);
  }

  function updateMonthDisplay() {
    document.getElementById('monthDisplay').textContent = MONTH_NAMES[viewMonth - 1] + ' ' + viewYear;
    document.getElementById('monthLabel').textContent = monthKey();
    document.getElementById('nextMonth').disabled = isCurrentMonth();
  }

  // Tab switching
  document.getElementById('trackTabs').addEventListener('click', function(e) {
    var tab = e.target.closest('.track-tab');
    if (!tab) return;
    currentTrack = tab.getAttribute('data-track');
    document.querySelectorAll('.track-tab').forEach(function(t) {
      t.classList.toggle('active', t.getAttribute('data-track') === currentTrack);
    });
    renderTrack();
  });

  // Month nav
  document.getElementById('prevMonth').addEventListener('click', function() {
    viewMonth--;
    if (viewMonth < 1) { viewMonth = 12; viewYear--; }
    updateMonthDisplay();
    loadLeaderboard();
  });
  document.getElementById('nextMonth').addEventListener('click', function() {
    if (isCurrentMonth()) return;
    viewMonth++;
    if (viewMonth > 12) { viewMonth = 1; viewYear++; }
    updateMonthDisplay();
    loadLeaderboard();
  });

  var leaderboardData = null;

  function renderTrack() {
    var list = document.getElementById('rankList');
    if (!leaderboardData) return;

    var entries = leaderboardData[currentTrack] || [];
    if (entries.length === 0) {
      list.innerHTML = '<div class="empty-state"><h3>Rankings update nightly</h3><p>Check back tomorrow for the latest scores.</p></div>';
      return;
    }

    var html = '';
    entries.forEach(function(e) {
      var rank = e.rank || '-';
      var rankClass = rank <= 3 ? ' rank-' + rank : '';
      var name = esc(e.display_name || e.entity_id);
      var score = parseFloat(e.score) || 0;

      var badgesHtml = '';
      if (e.is_defending_champion) {
        badgesHtml += '<span class="badge-champion">&#128081; Defending Champion</span>';
      }
      if (e.all_time_wins > 0) {
        badgesHtml += '<span class="badge-wins">&#127942; ' + e.all_time_wins + ' win' + (e.all_time_wins > 1 ? 's' : '') + '</span>';
      }

      html += '<div class="rank-row' + rankClass + '">'
        + '<div class="rank-num">#' + rank + '</div>'
        + '<div class="rank-info"><div class="rank-name">' + name + '</div>'
        + (badgesHtml ? '<div class="rank-badges">' + badgesHtml + '</div>' : '')
        + '</div>'
        + '<div class="rank-score-wrap">'
        + '<div class="score-bar"><div class="score-bar-fill" style="width:' + score + '%;"></div></div>'
        + '<div class="score-num">' + score.toFixed(1) + '</div>'
        + '</div>'
        + '</div>';
    });

    list.innerHTML = html;
  }

  async function loadLeaderboard() {
    try {
      var url = '/api/leaderboard/' + CITY + '?month=' + monthKey();
      var res = await fetch(url);
      if (!res.ok) throw new Error('Failed to load');
      leaderboardData = await res.json();
      renderTrack();
    } catch (err) {
      console.error('LEADERBOARD_LOAD_ERROR', err);
      document.getElementById('rankList').innerHTML = '<div class="empty-state"><h3>Could not load leaderboard</h3><p>Please try again later.</p></div>';
    }
  }

  // Check auth for nav
  var token = localStorage.getItem('tc_token');
  if (token) {
    document.getElementById('navLogin').textContent = 'Dashboard';
    document.getElementById('navLogin').href = '/dashboard';
  }

  updateCityDisplay();
  updateMonthDisplay();
  loadLeaderboard();
</script>
</body>
</html>
