<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — Treasure Coast</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0f1a; color: #e2e8f0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #111827; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 48px 40px; text-align: center;
      max-width: 440px; width: 90%;
    }
    .check {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(16,185,129,0.15); border: 3px solid #10b981;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; font-size: 40px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      background: #0ea5e9; color: #fff; border: none; border-radius: 8px;
      padding: 12px 32px; font-size: 15px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: background 0.2s;
    }
    .btn:hover { background: #0284c7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">&#10003;</div>
    <h1>Payment Successful!</h1>
    <p>The seller will contact you shortly about your flash sale item. You can also message them directly from the listing page.</p>
    <a href="/" class="btn">Back to Town</a>
  </div>
</body>
</html>
