<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/town/assets/ui-base.css">
  <style>
    .track-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px;
    }
    .track-tab {
      padding: 12px 20px; border: none; background: none; color: var(--muted);
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
      border-bottom: 2px solid transparent; transition: color 0.15s; white-space: nowrap;
    }
    .track-tab:hover { color: var(--text); }
    .track-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .lb-table { width: 100%; border-collapse: collapse; }
    .lb-table th {
      text-align: left; font-size: 12px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.04em; padding: 10px 14px; border-bottom: 1px solid var(--border);
    }
    .lb-table td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; }
    .lb-table tr:hover td { background: rgba(255,255,255,0.02); }
    .lb-table tr.rank-1 td { background: rgba(245,158,11,0.06); }
    .lb-table tr.rank-2 td { background: rgba(192,192,192,0.05); }
    .lb-table tr.rank-3 td { background: rgba(205,127,50,0.05); }
    .lb-table tr.current-user td { background: rgba(6,182,212,0.08); }
    .rank-num { font-weight: 700; min-width: 36px; display: inline-block; }
    .rank-1 .rank-num { color: var(--gold); }
    .rank-2 .rank-num { color: #c0c0c0; }
    .rank-3 .rank-num { color: #cd7f32; }
    .user-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
    .user-badge {
      display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600;
      background: rgba(6,182,212,0.12); color: var(--accent);
    }
    .score-val { font-weight: 700; font-size: 15px; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <div class="topbar" id="topbar"></div>
      <div class="content" id="pageContent">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <script src="/town/assets/ui-base.js"></script>
  <script>
  (function() {
    var place = 'treasure-coast';
    var currentTrack = 'overall';
    var tracks = [
      { key: 'overall', label: 'Overall' },
      { key: 'bst_groups', label: 'BST Groups' },
      { key: 'gigs', label: 'Gigs' },
      { key: 'community', label: 'Community' }
    ];
    var leaderboardData = null;
    var userBadges = {};

    async function boot() {
      var flags = await UB.init('/town/leaderboard', 'Leaderboard');
      if (!UB.hasFlag(flags, 'ui-base.leaderboard')) { UB.showDisabled('Leaderboard'); return; }
      renderPage();
      loadLeaderboard();
    }

    function renderPage() {
      var el = document.getElementById('pageContent');
      var tabsHtml = '<div class="track-tabs" id="trackTabs">';
      tracks.forEach(function(t) {
        var cls = t.key === currentTrack ? ' active' : '';
        tabsHtml += '<button class="track-tab' + cls + '" data-track="' + t.key + '">' + UB.esc(t.label) + '</button>';
      });
      tabsHtml += '</div>';
      el.innerHTML = tabsHtml + '<div id="rankList"><div class="spinner"></div></div>';
      document.getElementById('trackTabs').addEventListener('click', function(e) {
        var tab = e.target.closest('.track-tab');
        if (!tab) return;
        currentTrack = tab.getAttribute('data-track');
        document.querySelectorAll('.track-tab').forEach(function(t) {
          t.classList.toggle('active', t.getAttribute('data-track') === currentTrack);
        });
        loadLeaderboard();
      });
    }

    async function loadLeaderboard() {
      var list = document.getElementById('rankList');
      list.innerHTML = '<div class="spinner"></div>';
      var url = '/api/leaderboard/' + place + '?track=' + encodeURIComponent(currentTrack);
      var data = await UB.api(url);
      if (data.error) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#127942;</div><p>Could not load leaderboard.</p></div>';
        return;
      }
      leaderboardData = Array.isArray(data) ? data : (data.entries || data.leaderboard || data[currentTrack] || []);
      if (!leaderboardData.length) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#127942;</div><p>No rankings yet. Check back soon!</p></div>';
        return;
      }
      await loadBadgesForTop(leaderboardData);
      renderTable(leaderboardData);
    }

    async function loadBadgesForTop(entries) {
      var promises = [];
      entries.forEach(function(e) {
        var uid = e.user_id || e.entity_id || e.id;
        if (!uid || userBadges[uid]) return;
        promises.push(
          UB.api('/api/leaderboard/user/' + uid + '/badges').then(function(data) {
            if (!data.error) userBadges[uid] = Array.isArray(data) ? data : (data.badges || []);
          })
        );
      });
      await Promise.all(promises);
    }

    function renderTable(entries) {
      var list = document.getElementById('rankList');
      var userId = UB.currentUser ? UB.currentUser.id : null;
      var html = '<table class="lb-table"><thead><tr><th>Rank</th><th>Name</th><th>Score</th><th>Badges</th></tr></thead><tbody>';
      entries.forEach(function(e, i) {
        var rank = e.rank || (i + 1);
        var uid = e.user_id || e.entity_id || e.id;
        var name = e.display_name || e.name || uid;
        var score = parseFloat(e.score) || 0;
        var isMe = userId && uid === userId;
        var cls = '';
        if (rank === 1) cls = 'rank-1';
        else if (rank === 2) cls = 'rank-2';
        else if (rank === 3) cls = 'rank-3';
        if (isMe) cls += ' current-user';
        var badges = userBadges[uid] || [];
        var badgeHtml = '';
        badges.forEach(function(b) {
          var label = typeof b === 'string' ? b : (b.name || b.label || '');
          if (label) badgeHtml += '<span class="user-badge">' + UB.esc(label) + '</span>';
        });
        html += '<tr class="' + cls + '">'
          + '<td><span class="rank-num">#' + rank + '</span></td>'
          + '<td>' + UB.esc(name) + '</td>'
          + '<td><span class="score-val">' + score.toFixed(1) + '</span></td>'
          + '<td><div class="user-badges">' + badgeHtml + '</div></td>'
          + '</tr>';
      });
      html += '</tbody></table>';
      list.innerHTML = html;
    }

    boot();
  })();
  </script>
</body>
</html>
