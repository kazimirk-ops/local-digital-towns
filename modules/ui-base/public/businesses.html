<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Map | Digital Towns</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/town/assets/ui-base.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    #map {
      width: 100%;
      height: 400px;
      border-radius: 10px;
      border: 1px solid var(--border);
      z-index: 1;
    }
    .filter-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filter-tab {
      padding: 6px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-tab:hover {
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }
    .filter-tab.active {
      background: rgba(6,182,212,0.12);
      color: var(--accent);
      border-color: var(--accent);
    }
    .biz-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 20px;
    }
    .biz-card {
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .biz-card:hover {
      border-color: var(--accent);
    }
    .biz-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .biz-category {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      background: rgba(6,182,212,0.15);
      color: var(--accent);
      margin-bottom: 6px;
    }
    .biz-detail {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
    }
    .leaflet-popup-content-wrapper {
      background: var(--panel) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
    }
    .leaflet-popup-tip {
      background: var(--panel) !important;
    }
    .leaflet-popup-content {
      margin: 10px 14px !important;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
    }
    @media (max-width: 768px) {
      .biz-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <div class="topbar" id="topbar"></div>
      <div class="content" id="pageContent">
        <div class="spinner" id="loader"></div>
      </div>
    </div>
  </div>

  <script src="/town/assets/ui-base.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    (async function() {
      var flags = await UB.init('/town/businesses', 'Businesses');

      if (!UB.hasFlag(flags, 'ui-base.businesses')) {
        UB.showDisabled('Businesses');
        return;
      }

      document.getElementById('loader').remove();
      var page = document.getElementById('pageContent');

      var CATEGORIES = ['All', 'Food', 'Retail', 'Services', 'Auto', 'Health', 'Other'];
      var activeFilter = 'All';
      var businesses = [];
      var markers = {};
      var map = null;

      // Build page
      var tabsHtml = '';
      CATEGORIES.forEach(function(cat) {
        var cls = cat === 'All' ? ' active' : '';
        tabsHtml += '<button class="filter-tab' + cls + '" data-cat="' + cat + '">' + cat + '</button>';
      });

      page.innerHTML =
        '<div class="flex-between mb-md">'
        + '<h2 class="section-title">Business Map</h2>'
        + '</div>'
        + '<div class="filter-tabs" id="filterTabs">' + tabsHtml + '</div>'
        + '<div id="map"></div>'
        + '<div id="bizList" class="biz-list"><div class="spinner" style="grid-column:1/-1;"></div></div>';

      // Init map
      map = L.map('map').setView([27.8164, -80.4706], 12);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      // Filter tabs
      document.getElementById('filterTabs').addEventListener('click', function(e) {
        var tab = e.target.closest('.filter-tab');
        if (!tab) return;
        activeFilter = tab.getAttribute('data-cat');
        document.querySelectorAll('.filter-tab').forEach(function(t) {
          t.classList.toggle('active', t.getAttribute('data-cat') === activeFilter);
        });
        renderBusinesses();
      });

      // Load businesses
      var data = await UB.api('/api/businesses');
      if (data.error) {
        document.getElementById('bizList').innerHTML =
          '<div class="empty-state" style="grid-column:1/-1;"><p>Could not load businesses</p></div>';
        return;
      }

      businesses = Array.isArray(data) ? data : (data.businesses || []);
      renderBusinesses();

      function getFiltered() {
        if (activeFilter === 'All') return businesses;
        return businesses.filter(function(b) {
          return (b.category || 'Other').toLowerCase() === activeFilter.toLowerCase();
        });
      }

      function renderBusinesses() {
        // Clear old markers
        Object.keys(markers).forEach(function(k) {
          map.removeLayer(markers[k]);
        });
        markers = {};

        var filtered = getFiltered();
        var list = document.getElementById('bizList');

        if (filtered.length === 0) {
          list.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">'
            + '<div class="empty-icon">&#128205;</div>'
            + '<p>No businesses found' + (activeFilter !== 'All' ? ' in ' + UB.esc(activeFilter) : '') + '</p></div>';
          return;
        }

        var html = '';
        filtered.forEach(function(b, i) {
          var id = b.id || i;
          // Add marker
          if (b.lat && b.lng) {
            var popupContent = '<strong>' + UB.esc(b.name) + '</strong>';
            if (b.category) popupContent += '<br><span style="color:var(--accent);font-size:12px;">' + UB.esc(b.category) + '</span>';
            if (b.address) popupContent += '<br>' + UB.esc(b.address);

            var marker = L.marker([b.lat, b.lng]).addTo(map);
            marker.bindPopup(popupContent);
            markers[id] = marker;
          }

          // List card
          html += '<div class="card biz-card" data-biz-id="' + id + '"'
            + ' data-lat="' + (b.lat || '') + '" data-lng="' + (b.lng || '') + '">'
            + '<div class="biz-name">' + UB.esc(b.name) + '</div>';
          if (b.category) {
            html += '<span class="biz-category">' + UB.esc(b.category) + '</span>';
          }
          if (b.address) {
            html += '<div class="biz-detail">' + UB.esc(b.address) + '</div>';
          }
          if (b.phone) {
            html += '<div class="biz-detail">' + UB.esc(b.phone) + '</div>';
          }
          html += '</div>';
        });
        list.innerHTML = html;

        // Click card to pan
        list.querySelectorAll('.biz-card').forEach(function(card) {
          card.addEventListener('click', function() {
            var lat = parseFloat(card.getAttribute('data-lat'));
            var lng = parseFloat(card.getAttribute('data-lng'));
            var bizId = card.getAttribute('data-biz-id');
            if (!isNaN(lat) && !isNaN(lng)) {
              map.setView([lat, lng], 15);
              if (markers[bizId]) {
                markers[bizId].openPopup();
              }
            }
          });
        });
      }
    })();
  </script>
</body>
</html>
