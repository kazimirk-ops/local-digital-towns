<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — Digital Towns</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #070b10;
      color: #e8eef6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #0f1722;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo { font-size: 24px; font-weight: 700; color: #0ea5e9; margin-bottom: 4px; letter-spacing: -0.5px; }
    .sub { font-size: 13px; color: #64748b; margin-bottom: 28px; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; font-size: 12px; color: #475569;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #1e293b; }
    .oauth-row { display: flex; gap: 12px; margin-bottom: 4px; }
    .oauth-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px; border-radius: 10px; border: 1px solid #334155;
      background: transparent; color: #cbd5e1; font-size: 14px; font-weight: 500;
      font-family: inherit; cursor: pointer; text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .oauth-btn:hover { border-color: #64748b; background: #1e293b; }
    .oauth-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Email form */
    .email-form { text-align: left; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    input[type=email], input[type=text] {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      border: 1px solid #334155; background: #0a0f1a; color: #e8eef6;
      font-size: 15px; font-family: inherit; outline: none; margin-bottom: 14px;
    }
    input:focus { border-color: #0ea5e9; }
    .btn-primary {
      width: 100%; padding: 12px; background: #0ea5e9; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: #0284c7; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg { font-size: 13px; margin-top: 12px; min-height: 18px; }
    .msg.ok { color: #10b981; }
    .msg.err { color: #ef4444; }

    #codeSection { display: none; }
    .code-input {
      font-size: 24px; letter-spacing: 8px; text-align: center;
      font-weight: 700; padding: 14px;
    }

    .back-link {
      display: inline-block; margin-top: 20px; font-size: 13px;
      color: #64748b; text-decoration: none;
    }
    .back-link:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Digital Towns</div>
    <div class="sub">Sign in to continue</div>

    <!-- OAuth buttons -->
    <div class="oauth-row">
      <a href="/api/auth/google" class="oauth-btn" id="googleBtn">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </a>
      <a href="/api/auth/facebook/start" class="oauth-btn" id="fbBtn">
        <svg viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Facebook
      </a>
    </div>

    <div class="divider">or sign in with email</div>

    <!-- Email OTP form -->
    <div id="emailSection">
      <form class="email-form" id="emailForm">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
        <button type="submit" class="btn-primary" id="sendBtn">Send Login Code</button>
      </form>
    </div>

    <div id="codeSection">
      <form class="email-form" id="codeForm">
        <label for="code">Enter the 6-digit code sent to <span id="codeEmail"></span></label>
        <input type="text" id="code" name="code" class="code-input" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" placeholder="000000" required autofocus>
        <button type="submit" class="btn-primary" id="verifyBtn">Verify Code</button>
      </form>
      <a href="#" class="back-link" id="backBtn">Use a different email</a>
    </div>

    <div class="msg" id="msg"></div>

    <!-- Error from OAuth redirects -->
    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        var err = params.get("error");
        if (err) {
          var m = document.getElementById("msg");
          m.className = "msg err";
          m.textContent = "Login failed: " + err.replace(/_/g, " ");
        }
      })();
    </script>
  </div>

  <script>
    var emailEl = document.getElementById("email");
    var codeEl = document.getElementById("code");
    var msgEl = document.getElementById("msg");
    var emailSection = document.getElementById("emailSection");
    var codeSection = document.getElementById("codeSection");
    var codeEmailEl = document.getElementById("codeEmail");
    var sendBtn = document.getElementById("sendBtn");
    var verifyBtn = document.getElementById("verifyBtn");

    function showMsg(text, isError) {
      msgEl.textContent = text;
      msgEl.className = "msg " + (isError ? "err" : "ok");
    }

    // Step 1: Send code
    document.getElementById("emailForm").addEventListener("submit", function(e) {
      e.preventDefault();
      var email = emailEl.value.trim();
      if (!email) return;

      sendBtn.disabled = true;
      sendBtn.textContent = "Sending...";
      msgEl.textContent = "";

      fetch("/api/auth/request-code", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok) {
          emailSection.style.display = "none";
          codeSection.style.display = "block";
          codeEmailEl.textContent = email;
          showMsg("Code sent! Check your email.", false);
          codeEl.focus();
        } else {
          showMsg(d.error || "Failed to send code", true);
        }
      })
      .catch(function() { showMsg("Network error", true); })
      .finally(function() {
        sendBtn.disabled = false;
        sendBtn.textContent = "Send Login Code";
      });
    });

    // Step 2: Verify code
    document.getElementById("codeForm").addEventListener("submit", function(e) {
      e.preventDefault();
      var email = emailEl.value.trim();
      var code = codeEl.value.trim();
      if (!code || code.length !== 6) return;

      verifyBtn.disabled = true;
      verifyBtn.textContent = "Verifying...";
      msgEl.textContent = "";

      fetch("/api/auth/verify-code", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, code: code })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok) {
          showMsg("Logged in! Redirecting...", false);
          window.location.href = "/";
        } else {
          showMsg(d.error || "Invalid code", true);
        }
      })
      .catch(function() { showMsg("Network error", true); })
      .finally(function() {
        verifyBtn.disabled = false;
        verifyBtn.textContent = "Verify Code";
      });
    });

    // Back button
    document.getElementById("backBtn").addEventListener("click", function(e) {
      e.preventDefault();
      codeSection.style.display = "none";
      emailSection.style.display = "block";
      codeEl.value = "";
      msgEl.textContent = "";
      emailEl.focus();
    });
  </script>
</body>
</html>
