<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module Registry — Digital Towns</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0f1a; color:#e2e8f0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; min-height:100vh; }

    .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:#0f1722; border-bottom:1px solid #1e293b; position:sticky; top:0; z-index:100; }
    .topbar-left { display:flex; align-items:center; gap:12px; }
    .topbar-left a { color:#64748b; text-decoration:none; font-size:18px; }
    .topbar-left a:hover { color:#e2e8f0; }
    .topbar h1 { font-size:18px; font-weight:700; }
    .topbar-right { display:flex; align-items:center; gap:12px; }

    .community-select { padding:8px 14px; border-radius:8px; border:1px solid #1e293b; background:#0f1722; color:#e2e8f0; font-size:13px; font-family:inherit; outline:none; cursor:pointer; min-width:180px; }
    .community-select:focus { border-color:#0ea5e9; }
    .community-select option { background:#0f1722; color:#e2e8f0; }

    .container { max-width:1200px; margin:0 auto; padding:24px; }

    /* Stats bar */
    .stats-bar { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
    .stat-card { flex:1; min-width:120px; background:#0f1722; border:1px solid #1e293b; border-radius:10px; padding:16px; text-align:center; }
    .stat-value { font-size:28px; font-weight:800; }
    .stat-label { font-size:11px; color:#64748b; margin-top:4px; text-transform:uppercase; letter-spacing:0.5px; }

    /* Search and filters */
    .controls { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; align-items:center; }
    .search-input { flex:1; min-width:200px; padding:10px 14px; border-radius:8px; border:1px solid #1e293b; background:#0f1722; color:#e2e8f0; font-size:14px; font-family:inherit; outline:none; }
    .search-input:focus { border-color:#0ea5e9; }
    .search-input::placeholder { color:#475569; }
    .filter-btn { padding:8px 16px; border-radius:8px; border:1px solid #1e293b; background:#0f1722; color:#64748b; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.15s; }
    .filter-btn:hover { border-color:#334155; color:#e2e8f0; }
    .filter-btn.active { background:#0ea5e9; color:#fff; border-color:#0ea5e9; }

    /* Layer sections */
    .layer-section { margin-bottom:28px; }
    .layer-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding-bottom:8px; border-bottom:2px solid; }
    .layer-header h2 { font-size:16px; font-weight:700; }
    .layer-header .layer-count { font-size:12px; color:#64748b; }
    .layer-0 .layer-header { border-color:#ef4444; }
    .layer-0 .layer-header h2 { color:#ef4444; }
    .layer-1 .layer-header { border-color:#3b82f6; }
    .layer-1 .layer-header h2 { color:#3b82f6; }
    .layer-2 .layer-header { border-color:#8b5cf6; }
    .layer-2 .layer-header h2 { color:#8b5cf6; }
    .layer-3 .layer-header { border-color:#10b981; }
    .layer-3 .layer-header h2 { color:#10b981; }
    .layer-4 .layer-header { border-color:#f59e0b; }
    .layer-4 .layer-header h2 { color:#f59e0b; }
    .layer-5 .layer-header { border-color:#06b6d4; }
    .layer-5 .layer-header h2 { color:#06b6d4; }

    /* Module cards */
    .module-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:12px; }
    .module-card { background:#0f1722; border:1px solid #1e293b; border-radius:10px; cursor:pointer; transition:border-color 0.15s; overflow:hidden; }
    .module-card:hover { border-color:#334155; }
    .module-card.expanded { grid-column:1/-1; }
    .module-card-header { padding:14px 16px; display:flex; align-items:center; gap:10px; }
    .module-icon { font-size:24px; width:36px; text-align:center; flex-shrink:0; }
    .module-info { flex:1; min-width:0; }
    .module-name { font-size:14px; font-weight:700; }
    .module-desc-short { font-size:11px; color:#64748b; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .module-badge { padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; white-space:nowrap; flex-shrink:0; }
    .badge-active { background:#064e3b; color:#10b981; }
    .badge-available { background:#1e293b; color:#94a3b8; }
    .badge-needs-build { background:#1e1b4b; color:#818cf8; }

    /* Expanded content */
    .module-expanded { padding:0 16px 16px; display:none; border-top:1px solid #1e293b; }
    .module-card.expanded .module-expanded { display:block; padding-top:14px; }
    .module-card.expanded .module-desc-short { display:none; }

    .detail-section { margin-bottom:14px; }
    .detail-section h4 { font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
    .detail-desc { font-size:13px; color:#94a3b8; line-height:1.5; margin-bottom:14px; }

    .dep-list { display:flex; flex-wrap:wrap; gap:6px; }
    .dep-chip { padding:3px 10px; border-radius:6px; font-size:11px; font-weight:600; }
    .dep-met { background:#064e3b; color:#10b981; }
    .dep-missing { background:#450a0a; color:#ef4444; }

    /* Sub-modules tree */
    .submod-tree { margin:0; padding:0; list-style:none; }
    .submod-item { position:relative; padding:8px 0 8px 24px; border-bottom:1px solid rgba(255,255,255,0.03); display:flex; align-items:center; gap:10px; }
    .submod-item:last-child { border-bottom:none; }
    .submod-connector { position:absolute; left:4px; top:0; bottom:0; width:12px; }
    .submod-connector::before { content:''; position:absolute; left:0; top:0; bottom:50%; border-left:1px solid #334155; }
    .submod-connector::after { content:''; position:absolute; left:0; top:50%; width:12px; border-top:1px solid #334155; }
    .submod-item:last-child .submod-connector::before { bottom:50%; }
    .submod-icon { font-size:14px; width:20px; text-align:center; }
    .submod-name { font-size:13px; color:#e2e8f0; font-weight:600; }
    .submod-badge { padding:2px 8px; border-radius:10px; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
    .submod-required { background:#1e293b; color:#64748b; }
    .submod-optional { background:#1a2636; color:#0ea5e9; }
    .submod-frontend { background:#1a1b2e; color:#8b5cf6; }

    /* Action buttons */
    .module-actions { margin-top:14px; display:flex; gap:8px; }
    .btn-install { padding:8px 20px; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; background:#10b981; color:#fff; transition:background 0.15s; }
    .btn-install:hover { background:#059669; }
    .btn-install:disabled { background:#334155; color:#64748b; cursor:not-allowed; }
    .btn-uninstall { padding:8px 20px; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; background:#ef4444; color:#fff; transition:background 0.15s; }
    .btn-uninstall:hover { background:#dc2626; }

    /* Tier controls */
    .tier-row { display:flex; align-items:center; gap:10px; margin-top:10px; }
    .tier-label { font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; font-weight:700; }
    .tier-select { padding:5px 10px; border-radius:6px; border:1px solid #1e293b; background:#0a0f1a; color:#e2e8f0; font-size:12px; font-family:inherit; cursor:pointer; outline:none; }
    .tier-select:focus { border-color:#0ea5e9; }
    .tier-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; margin-left:6px; }
    .tier-0 { background:#064e3b; color:#10b981; }
    .tier-1 { background:#1e3a5f; color:#3b82f6; }
    .tier-2 { background:#2d1b69; color:#8b5cf6; }
    .tier-3 { background:#422006; color:#f59e0b; }
    .tier-4 { background:#450a0a; color:#ef4444; }

    .toast { position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:8px; font-size:13px; font-weight:600; z-index:9999; animation:slideIn 0.3s ease; }
    .toast-success { background:#064e3b; color:#10b981; border:1px solid #10b981; }
    .toast-error { background:#450a0a; color:#ef4444; border:1px solid #ef4444; }
    @keyframes slideIn { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }

    .loading { text-align:center; padding:60px; color:#64748b; font-size:14px; }

    @media(max-width:600px) {
      .container { padding:16px; }
      .module-grid { grid-template-columns:1fr; }
      .stats-bar { flex-direction:column; }
      .topbar { flex-wrap:wrap; gap:8px; }
      .community-select { min-width:140px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <a href="/admin" title="Back to Admin">&larr;</a>
      <h1>Module Registry</h1>
    </div>
    <div class="topbar-right">
      <select class="community-select" id="communitySelect" onchange="onCommunityChange()">
        <option value="">Loading communities...</option>
      </select>
    </div>
  </div>

  <div class="container">
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-value" id="statTotal">&mdash;</div><div class="stat-label">Total Modules</div></div>
      <div class="stat-card"><div class="stat-value" id="statActive" style="color:#10b981;">&mdash;</div><div class="stat-label">Active</div></div>
      <div class="stat-card"><div class="stat-value" id="statAvailable" style="color:#94a3b8;">&mdash;</div><div class="stat-label">Available</div></div>
      <div class="stat-card"><div class="stat-value" id="statNeedsBuild" style="color:#818cf8;">0</div><div class="stat-label">Inactive</div></div>
    </div>

    <div class="controls">
      <input type="text" class="search-input" id="searchInput" placeholder="Search modules by name, description, or ID...">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="available">Available</button>
      <button class="filter-btn" data-filter="L0">L0</button>
      <button class="filter-btn" data-filter="L1">L1</button>
      <button class="filter-btn" data-filter="L2">L2</button>
      <button class="filter-btn" data-filter="L3">L3</button>
      <button class="filter-btn" data-filter="L4">L4</button>
      <button class="filter-btn" data-filter="L5">L5</button>
    </div>

    <div id="moduleContent">
      <div class="loading">Loading modules...</div>
    </div>
  </div>

  <script>
    // ===== State =====
    var communities = [];
    var selectedSlug = '';
    var featureFlags = {};
    var currentFilter = 'all';
    var searchTerm = '';
    var expandedId = null;

    var layerNames = {
      0: 'Foundation',
      1: 'Commerce',
      2: 'Engagement',
      4: 'Trust & Safety',
      5: 'Frontend'
    };
    var layerColors = { 0:'#ef4444', 1:'#3b82f6', 2:'#8b5cf6', 3:'#10b981', 4:'#f59e0b', 5:'#06b6d4' };

    var tierNames = {
      0: 'Guest / Anyone',
      1: 'Basic Member',
      2: 'Engaged Member',
      3: 'Verified Seller',
      4: 'Admin Only'
    };

    // ===== Module Registry (loaded dynamically from /api/modules) =====
    var modules = [];

    // Icon map for modules (manifests don't include icons)
    var moduleIcons = {
      'core':'\u{1F3D7}', 'auth':'\u{1F510}', 'places':'\u{1F4CD}', 'tags':'\u{1F3F7}',
      'channels':'\u{1F4AC}', 'bst-groups':'\u{1F3EA}', 'gigs':'\u{1F527}', 'pulse':'\u{1F4E1}',
      'businesses':'\u{1F4CD}', 'listings':'\u{1F3F7}', 'orders':'\u{1F4E6}', 'payments':'\u{1F4B3}',
      'shipping':'\u{1F69A}', 'notifications':'\u{1F514}', 'sweepstakes':'\u{1F3B0}',
      'achievements':'\u{1F3C6}', 'live-shows':'\u{1F4FA}', 'referrals':'\u{1F517}',
      'trust':'\u{1F6E1}', 'disputes':'\u{2696}', 'ui-base':'\u{1F5A5}',
      'ui-treasurecoast':'\u{1F3D6}', 'niche-network':'\u{1F310}'
    };

    // ===== Helpers =====
    function escHtml(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function showToast(msg, type) {
      var t = document.createElement('div');
      t.className = 'toast toast-' + (type || 'success');
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(function() { t.remove(); }, 3000);
    }

    function getModuleStatus(m) {
      var flag = featureFlags[m.id];
      if (flag === true) return 'active';
      return 'available';
    }

    function statusBadgeHtml(status) {
      var map = {
        'active': '<span class="module-badge badge-active">\u2713 ACTIVE</span>',
        'available': '<span class="module-badge badge-available">\u25A1 AVAILABLE</span>'
      };
      return map[status] || '';
    }

    function areDependenciesMet(m) {
      return (m.dependencies || []).every(function(depId) {
        return featureFlags[depId] === true;
      });
    }

    // ===== Community loading =====
    function loadCommunities() {
      fetch('/api/communities/list', { credentials:'same-origin' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          communities = data.communities || data || [];
          var sel = document.getElementById('communitySelect');
          if (!communities.length) {
            sel.innerHTML = '<option value="">No communities found</option>';
            return;
          }
          sel.innerHTML = '';
          communities.forEach(function(c) {
            var opt = document.createElement('option');
            opt.value = c.slug || c.id;
            opt.textContent = c.name || c.slug || c.id;
            sel.appendChild(opt);
          });
          selectedSlug = sel.value;
          loadFeatureFlags();
        })
        .catch(function(err) {
          console.error('Failed to load communities:', err);
          var sel = document.getElementById('communitySelect');
          sel.innerHTML = '<option value="">Failed to load</option>';
          // Still render modules without flags
          renderModules();
        });
    }

    function onCommunityChange() {
      var sel = document.getElementById('communitySelect');
      selectedSlug = sel.value;
      loadFeatureFlags();
    }

    // ===== Feature flags + dynamic module loading =====
    function loadFeatureFlags() {
      if (!selectedSlug) { featureFlags = {}; renderModules(); return; }
      // Pull flags from already-loaded communities data
      var comm = communities.find(function(c) { return (c.slug || c.id) === selectedSlug; });
      if (comm && comm.feature_flags) {
        featureFlags = typeof comm.feature_flags === 'string' ? JSON.parse(comm.feature_flags) : comm.feature_flags;
      } else {
        featureFlags = {};
      }
      // Load modules dynamically from API
      loadModules();
    }

    function loadModules() {
      var url = '/api/modules';
      if (selectedSlug) url += '?community=' + encodeURIComponent(selectedSlug);
      fetch(url, { credentials:'same-origin' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var apiModules = data.modules || [];
          modules = apiModules.map(function(m) {
            return {
              id: m.id,
              name: m.name,
              icon: moduleIcons[m.id] || '\u{1F4E6}',
              layer: m.layer,
              layerGroup: layerNames[m.layer] || ('Layer ' + m.layer),
              description: m.description || '',
              dependencies: m.dependencies || [],
              submodules: (m.submodules || []).map(function(s) {
                return {
                  id: s.id,
                  name: s.name,
                  desc: s.description || '',
                  frontend: s.frontend || false
                };
              })
            };
          });
          renderModules();
        })
        .catch(function(err) {
          console.error('Failed to load modules:', err);
          renderModules();
        });
    }

    // ===== Install / Uninstall =====
    function installModule(id) {
      event.stopPropagation();
      var mod = modules.find(function(m) { return m.id === id; });
      if (!mod) return;

      fetch('/api/admin/modules/' + encodeURIComponent(id) + '/install', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ community_slug: selectedSlug })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          showToast('Install failed: ' + (data.detail || data.error || JSON.stringify(data)), 'error');
          return;
        }
        showToast(mod.name + ' installed (' + (data.flags_enabled || []).length + ' flags enabled)', 'success');
        loadCommunities();
      })
      .catch(function() { showToast('Install failed', 'error'); });
    }

    function uninstallModule(id) {
      event.stopPropagation();
      if (!confirm('Uninstall this module? Feature flags will be disabled.')) return;
      var mod = modules.find(function(m) { return m.id === id; });
      if (!mod) return;

      fetch('/api/admin/modules/' + encodeURIComponent(id) + '/uninstall', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ community_slug: selectedSlug })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          showToast('Uninstall failed: ' + (data.detail || data.error || JSON.stringify(data)), 'error');
          return;
        }
        showToast(mod.name + ' uninstalled', 'success');
        loadCommunities();
      })
      .catch(function() { showToast('Uninstall failed', 'error'); });
    }

    function setTier(id, tier) {
      event.stopPropagation();
      var mod = modules.find(function(m) { return m.id === id; });
      fetch('/api/admin/modules/' + encodeURIComponent(id) + '/set-tier', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ tier: parseInt(tier), community_slug: selectedSlug })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          showToast('Set tier failed: ' + (data.detail || data.error), 'error');
          return;
        }
        showToast((mod ? mod.name : id) + ' tier set to ' + tier + ' — ' + (tierNames[tier] || ''), 'success');
        loadCommunities();
      })
      .catch(function() { showToast('Set tier failed', 'error'); });
    }

    // ===== Rendering =====
    function renderModules() {
      var content = document.getElementById('moduleContent');

      // Filter modules
      var filtered = modules.filter(function(m) {
        var status = getModuleStatus(m);
        // Layer filters
        if (currentFilter.charAt(0) === 'L') {
          var layerNum = parseInt(currentFilter.substring(1));
          if (m.layer !== layerNum) return false;
        } else if (currentFilter === 'active' && status !== 'active') return false;
        else if (currentFilter === 'available' && status !== 'available') return false;

        // Search
        if (searchTerm) {
          var s = searchTerm.toLowerCase();
          return (m.name || '').toLowerCase().indexOf(s) !== -1
            || (m.description || '').toLowerCase().indexOf(s) !== -1
            || (m.id || '').toLowerCase().indexOf(s) !== -1;
        }
        return true;
      });

      // Compute stats (from all modules, not just filtered)
      var totalActive = 0, totalAvailable = 0;
      modules.forEach(function(m) {
        var st = getModuleStatus(m);
        if (st === 'active') totalActive++;
        else totalAvailable++;
      });
      document.getElementById('statTotal').textContent = modules.length;
      document.getElementById('statActive').textContent = totalActive;
      document.getElementById('statAvailable').textContent = totalAvailable;
      var nbEl = document.getElementById('statNeedsBuild');
      if (nbEl) nbEl.textContent = '0';

      // Group by layer + layerGroup
      var sections = {};
      filtered.forEach(function(m) {
        var key = m.layer + ':' + (m.layerGroup || '');
        if (!sections[key]) sections[key] = { layer: m.layer, layerGroup: m.layerGroup, modules: [] };
        sections[key].modules.push(m);
      });

      var sortedKeys = Object.keys(sections).sort(function(a, b) {
        var la = parseInt(a.split(':')[0]), lb = parseInt(b.split(':')[0]);
        if (la !== lb) return la - lb;
        return a.localeCompare(b);
      });

      if (!sortedKeys.length) {
        content.innerHTML = '<div class="loading">No modules match your filter.</div>';
        return;
      }

      var html = '';
      sortedKeys.forEach(function(key) {
        var section = sections[key];
        html += '<div class="layer-section layer-' + section.layer + '">';
        html += '<div class="layer-header"><h2>L' + section.layer + ' \u2014 ' + escHtml(section.layerGroup) + '</h2>';
        html += '<span class="layer-count">' + section.modules.length + ' module' + (section.modules.length !== 1 ? 's' : '') + '</span></div>';
        html += '<div class="module-grid">';

        section.modules.forEach(function(m) {
          var status = getModuleStatus(m);
          var isExpanded = expandedId === m.id;
          html += '<div class="module-card' + (isExpanded ? ' expanded' : '') + '" onclick="toggleExpand(\'' + escHtml(m.id) + '\')">';
          html += '<div class="module-card-header">';
          html += '<div class="module-icon">' + (m.icon || '') + '</div>';
          html += '<div class="module-info"><div class="module-name">' + escHtml(m.name) + '</div>';
          html += '<div class="module-desc-short">' + escHtml(m.description) + '</div></div>';
          html += statusBadgeHtml(status);
          if (status === 'active') {
            var hdrTier = featureFlags[m.id + '.tier'] ?? 0;
            html += '<span class="tier-badge tier-' + hdrTier + '" style="margin-left:6px;">T' + hdrTier + '</span>';
          }
          html += '</div>';

          // Expanded content
          html += '<div class="module-expanded">';
          html += '<div class="detail-desc">' + escHtml(m.description) + '</div>';

          // Dependencies
          var deps = m.dependencies || [];
          if (deps.length) {
            html += '<div class="detail-section"><h4>Dependencies</h4><div class="dep-list">';
            deps.forEach(function(depId) {
              var isMet = featureFlags[depId] === true;
              html += '<span class="dep-chip ' + (isMet ? 'dep-met' : 'dep-missing') + '">' + escHtml(depId) + (isMet ? ' \u2713' : ' \u2717') + '</span>';
            });
            html += '</div></div>';
          }

          // Backend sub-modules
          var backendSubs = (m.submodules || []).filter(function(s) { return !s.frontend; });
          if (backendSubs.length) {
            html += '<div class="detail-section"><h4>Backend Sub-modules</h4>';
            html += '<ul class="submod-tree">';
            backendSubs.forEach(function(sub) {
              html += '<li class="submod-item">';
              html += '<span class="submod-connector"></span>';
              html += '<span class="submod-icon">\u2699\uFE0F</span>';
              html += '<span class="submod-name">' + escHtml(sub.name) + '</span>';
              if (sub.desc) html += '<span style="font-size:11px;color:#64748b;margin-left:4px;">\u2014 ' + escHtml(sub.desc) + '</span>';
              html += '</li>';
            });
            html += '</ul></div>';
          }

          // Frontend sub-modules
          var frontendSubs = (m.submodules || []).filter(function(s) { return s.frontend; });
          if (frontendSubs.length) {
            html += '<div class="detail-section"><h4>Frontend Sub-modules</h4>';
            html += '<ul class="submod-tree">';
            frontendSubs.forEach(function(sub) {
              html += '<li class="submod-item">';
              html += '<span class="submod-connector"></span>';
              html += '<span class="submod-icon">\u{1F5A5}</span>';
              html += '<span class="submod-name">' + escHtml(sub.name) + '</span>';
              if (sub.desc) html += '<span style="font-size:11px;color:#64748b;margin-left:4px;">\u2014 ' + escHtml(sub.desc) + '</span>';
              html += '<span class="submod-badge submod-frontend">FRONTEND</span>';
              html += '</li>';
            });
            html += '</ul></div>';
          }

          // Tier controls (only for active modules)
          if (status === 'active') {
            var currentTier = featureFlags[m.id + '.tier'] ?? 0;
            html += '<div class="tier-row" onclick="event.stopPropagation();">';
            html += '<span class="tier-label">Min Tier:</span>';
            html += '<select class="tier-select" onchange="setTier(\'' + escHtml(m.id) + '\', this.value)">';
            for (var t = 0; t <= 4; t++) {
              html += '<option value="' + t + '"' + (t === currentTier ? ' selected' : '') + '>' + t + ' \u2014 ' + tierNames[t] + '</option>';
            }
            html += '</select>';
            html += '<span class="tier-badge tier-' + currentTier + '">T' + currentTier + '</span>';
            html += '</div>';
          }

          // Actions
          html += '<div class="module-actions" onclick="event.stopPropagation();">';
          if (status === 'active') {
            html += '<button class="btn-uninstall" onclick="uninstallModule(\'' + escHtml(m.id) + '\')">Uninstall</button>';
          } else {
            if (areDependenciesMet(m)) {
              html += '<button class="btn-install" onclick="installModule(\'' + escHtml(m.id) + '\')">Install</button>';
            } else {
              var missing = deps.filter(function(d) { return featureFlags[d] !== true; });
              html += '<button class="btn-install" disabled>Requires: ' + escHtml(missing.join(', ')) + '</button>';
            }
          }
          html += '</div>';

          html += '</div>'; // module-expanded
          html += '</div>'; // module-card
        });

        html += '</div></div>'; // module-grid, layer-section
      });

      content.innerHTML = html;
    }

    function toggleExpand(id) {
      expandedId = expandedId === id ? null : id;
      renderModules();
    }

    // ===== Filter & Search =====
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderModules();
      });
    });

    document.getElementById('searchInput').addEventListener('input', function() {
      searchTerm = this.value;
      renderModules();
    });

    // ===== Init =====
    loadCommunities();
  </script>
</body>
</html>
