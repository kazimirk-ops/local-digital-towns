<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b241c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a3a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#c0392b" flood-opacity="0.4"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="10" flood-color="#000" flood-opacity="0.9"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.08"/>
    </pattern>
    <linearGradient id="heroOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:0.3" />
      <stop offset="40%" style="stop-color:#0a0e1a;stop-opacity:0.0" />
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Gradient overlay for text contrast -->
  <rect width="1200" height="675" fill="url(#heroOverlay)"/>

  <!-- Subtle red glow behind scale -->
  <ellipse cx="600" cy="340" rx="420" ry="200" fill="#c0392b" opacity="0.04"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- SCALE BEAM - tilted heavily right (renter side down) -->
  <!-- Pivot point at 600, 220 -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Scale pole -->
  <rect x="595" y="130" width="10" height="200" fill="#3a3a4a" rx="3"/>
  <!-- Scale base -->
  <rect x="540" y="328" width="120" height="12" fill="#3a3a4a" rx="4"/>
  <rect x="565" y="340" width="70" height="8" fill="#2a2a3a" rx="3"/>

  <!-- Scale top ornament -->
  <circle cx="600" cy="128" r="14" fill="#3a3a4a"/>
  <circle cx="600" cy="128" r="8" fill="#c0392b" filter="url(#glow)"/>

  <!-- SCALE BEAM - tilted: landlord left is UP, renter right is DOWN -->
  <!-- Beam rotated ~18 degrees around center 600,220 -->
  <g transform="rotate(-18, 600, 220)">
    <rect x="230" y="215" width="740" height="10" fill="#4a4a5a" rx="5"/>

    <!-- Left side strings (landlord - UP) -->
    <line x1="290" y1="220" x2="290" y2="270" stroke="#5a5a6a" stroke-width="2.5"/>
    <line x1="270" y1="220" x2="270" y2="270" stroke="#5a5a6a" stroke-width="2.5"/>

    <!-- Right side strings (renter - DOWN) -->
    <line x1="910" y1="220" x2="910" y2="320" stroke="#5a5a6a" stroke-width="2.5"/>
    <line x1="930" y1="220" x2="930" y2="320" stroke="#5a5a6a" stroke-width="2.5"/>

    <!-- LEFT PLATFORM (Landlord - elevated) -->
    <rect x="230" y="268" width="100" height="10" fill="#3a3a4a" rx="3"/>

    <!-- RIGHT PLATFORM (Renter - weighted down) -->
    <rect x="870" y="318" width="100" height="10" fill="#c0392b" rx="3" opacity="0.9"/>
  </g>

  <!-- ══════════════════════════════════════════ -->
  <!-- LEFT SIDE: LANDLORD (elevated, powerful) -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Landlord figure - tall, commanding -->
  <g transform="translate(200, 115)">
    <!-- Shadow -->
    <ellipse cx="80" cy="185" rx="45" ry="8" fill="#000" opacity="0.5"/>
    <!-- Body - suit -->
    <rect x="50" y="100" width="60" height="75" fill="#1e1e2e" rx="4"/>
    <!-- Suit lapels -->
    <polygon points="80,100 60,115 70,100" fill="#2a2a3e"/>
    <polygon points="80,100 100,115 90,100" fill="#2a2a3e"/>
    <!-- Tie -->
    <polygon points="80,105 76,140 80,145 84,140" fill="#c0392b"/>
    <!-- Head -->
    <circle cx="80" cy="82" r="28" fill="#d4a574"/>
    <!-- Confident smile -->
    <path d="M 70 90 Q 80 98 90 90" stroke="#8B5E3C" stroke-width="2" fill="none"/>
    <!-- Eyes -->
    <circle cx="73" cy="80" r="3.5" fill="#2c1810"/>
    <circle cx="87" cy="80" r="3.5" fill="#2c1810"/>
    <!-- Arms -->
    <rect x="22" y="105" width="28" height="12" fill="#1e1e2e" rx="4" transform="rotate(15, 36, 111)"/>
    <rect x="110" y="100" width="28" height="12" fill="#1e1e2e" rx="4" transform="rotate(-20, 124, 106)"/>
    <!-- Legs -->
    <rect x="55" y="172" width="20" height="40" fill="#0f0f1a" rx="3"/>
    <rect x="85" y="172" width="20" height="40" fill="#0f0f1a" rx="3"/>
    <!-- Shoes -->
    <ellipse cx="65" cy="212" rx="16" ry="6" fill="#0a0a0a"/>
    <ellipse cx="95" cy="212" rx="16" ry="6" fill="#0a0a0a"/>

    <!-- KEY in hand (right hand raised) -->
    <g transform="translate(128, 82) rotate(-30)">
      <circle cx="0" cy="0" r="11" fill="none" stroke="#f0c040" stroke-width="4"/>
      <rect x="8" y="-2" width="28" height="5" fill="#f0c040" rx="2"/>
      <rect x="28" y="3" width="5" height="8" fill="#f0c040" rx="1"/>
      <rect x="22" y="3" width="5" height="6" fill="#f0c040" rx="1"/>
    </g>

    <!-- Crown above landlord -->
    <g transform="translate(60, 45)">
      <polygon points="20,20 0,40 40,40" fill="#f0c040" opacity="0.9"/>
      <polygon points="10,20 -5,5 15,25" fill="#f0c040" opacity="0.9"/>
      <polygon points="30,20 45,5 25,25" fill="#f0c040" opacity="0.9"/>
      <circle cx="10" cy="5" r="4" fill="#c0392b"/>
      <circle cx="30" cy="5" r="4" fill="#c0392b"/>
      <circle cx="20" cy="20" r="3" fill="#c0392b"/>
    </g>
  </g>

  <!-- Landlord label -->
  <text x="282" y="348" font-family="Georgia, serif" font-size="13" fill="#f0c040" text-anchor="middle" font-weight="700" opacity="1">LANDLORD</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- RIGHT SIDE: RENTER (crushed, burdened) -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Renter figure - small, crushed under weight -->
  <g transform="translate(840, 195)">
    <!-- Person crushed/kneeling under the weight -->
    <!-- Shadow -->
    <ellipse cx="80" cy="192" rx="40" ry="7" fill="#000" opacity="0.6"/>

    <!-- Body - hunched, kneeling -->
    <rect x="55" y="115" width="50" height="60" fill="#2d4a6b" rx="4" transform="rotate(5, 80, 145)"/>
    <!-- Head - looking down/stressed -->
    <circle cx="80" cy="100" r="22" fill="#d4a574"/>
    <!-- Stressed expression -->
    <path d="M 72 110 Q 80 106 88 110" stroke="#8B5E3C" stroke-width="2" fill="none"/>
    <!-- Eyes - worried -->
    <path d="M 73 98 Q 75 94 77 98" stroke="#2c1810" stroke-width="2" fill="none"/>
    <path d="M 83 98 Q 85 94 87 98" stroke="#2c1810" stroke-width="2" fill="none"/>
    <!-- Sweat drop -->
    <ellipse cx="92" cy="95" rx="3" ry="5" fill="#4a9eff" opacity="0.7"/>

    <!-- Arms pushing up against weight -->
    <rect x="20" y="120" width="35" height="11" fill="#2d4a6b" rx="4" transform="rotate(-40, 37, 125)"/>
    <rect x="100" y="120" width="35" height="11" fill="#2d4a6b" rx="4" transform="rotate(40, 117, 125)"/>

    <!-- Kneeling legs -->
    <rect x="58" y="170" width="18" height="30" fill="#1a2e45" rx="3" transform="rotate(10, 67, 185)"/>
    <rect x="82" y="170" width="18" height="30" fill="#1a2e45" rx="3" transform="rotate(-10, 91, 185)"/>
  </g>

  <!-- CRUSHING WEIGHT STACK above renter -->
  <!-- Stack of requirement blocks crashing down -->

  <!-- Block 5 (top) - References -->
  <g transform="translate(855, 138)">
    <rect x="0" y="0" width="130" height="30" fill="#1a1a2e" stroke="#3a3a5e" stroke-width="1" rx="3"/>
    <text x="65" y="19" font-family="'Courier New', monospace" font-size="10.5" fill="#8888aa" text-anchor="middle">📋 REFERENCES REQ'D</text>
  </g>

  <!-- Block 4 - Employment History -->
  <g transform="translate(852, 170)">
    <rect x="0" y="0" width="136" height="32" fill="#1a1a2e" stroke="#4a3a5e" stroke-width="1" rx="3"/>
    <text x="68" y="14" font-family="'Courier New', monospace" font-size="10" fill="#9988bb" text-anchor="middle">💼 STABLE JOB</text>
    <text x="68" y="27" font-family="'Courier New', monospace" font-size="9" fill="#7766aa" text-anchor="middle">MONTHS OF HISTORY</text>
  </g>

  <!-- Block 3 - Income -->
  <g transform="translate(848, 203)">
    <rect x="0" y="0" width="144" height="34" fill="#1f1520" stroke="#5e3a4a" stroke-width="1.5" rx="3"/>
    <text x="72" y="14" font-family="'Courier New', monospace" font-size="10.5" fill="#cc8888" text-anchor="middle">💰 EARN 3× RENT</text>
    <text x="72" y="28" font-family="'Courier New', monospace" font-size="9" fill="#aa6666" text-anchor="middle">PER MONTH, EVERY MONTH</text>
  </g>

  <!-- Block 2 - Credit Score -->
  <g transform="translate(844, 239)">
    <rect x="0" y="0" width="152" height="36" fill="#1f1515" stroke="#7e3a3a" stroke-width="2" rx="3"/>
    <text x="76" y="15" font-family="'Courier New', monospace" font-size="11" fill="#dd7777" text-anchor="middle">📊 CREDIT SCORE</text>
    <text x="76" y="30" font-family="'Courier New', monospace" font-size="9.5" fill="#bb5555" text-anchor="middle">MUST BE "GOOD ENOUGH"</text>
  </g>

  <!-- Block 1 (bottom/heaviest) - Criminal Record -->
  <g transform="translate(838, 277)">
    <rect x="0" y="0" width="164" height="40" fill="#200808" stroke="#c0392b" stroke-width="2.5" rx="3" filter="url(#shadow)"/>
    <text x="82" y="17" font-family="'Courier New', monospace" font-size="12" fill="#ff6666" text-anchor="middle" font-weight="bold">⚖️ CLEAN RECORD</text>
    <text x="82" y="32" font-family="'Courier New', monospace" font-size="9.5" fill="#cc4444" text-anchor="middle">NO SECOND CHANCES</text>
  </g>

  <!-- Renter label -->
  <text x="922" y="430" font-family="Georgia, serif" font-size="13" fill="#60a5fa" text-anchor="middle" font-weight="700">RENTER</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- CENTER DIVIDING LINE & DOOR -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Vertical divider - subtle -->
  <line x1="600" y1="80" x2="600" y2="580" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- MAIN HEADLINE TEXT -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Top label -->
  <text x="600" y="58" font-family="'Courier New', monospace" font-size="11" fill="#f0c040" text-anchor="middle" letter-spacing="6" opacity="1">THE RENTAL SYSTEM IS BROKEN</text>

  <!-- Main title -->
  <text x="600" y="500" font-family="Georgia, serif" font-size="52" fill="#ffffff" text-anchor="middle" font-weight="800" filter="url(#textShadow)" letter-spacing="-1" style="text-shadow:0 2px 20px rgba(0,0,0,0.8)">The System Needs a New Key.</text>

  <!-- Subtitle -->
  <text x="600" y="540" font-family="Georgia, serif" font-size="19" fill="#e2e8f0" text-anchor="middle" font-style="italic" filter="url(#textShadow)">Renters carry everything. Landlords answer to no one.</text>

  <!-- Bottom tagline -->
  <rect x="370" y="556" width="460" height="38" fill="#b91c1c" rx="4" opacity="1"/>
  <rect x="370" y="556" width="460" height="38" fill="none" stroke="#ef4444" stroke-width="1" rx="4" opacity="1"/>
  <text x="600" y="580" font-family="'Courier New', monospace" font-size="13" fill="#ffffff" text-anchor="middle" letter-spacing="2">INTRODUCING FAIR RENTER MARKETPLACE — COMING SOON</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- LANDLORD SIDE CALLOUT -->
  <!-- ══════════════════════════════════════════ -->
  <text x="282" y="380" font-family="Georgia, serif" font-size="12" fill="#f0c040" text-anchor="middle" opacity="0.8" font-style="italic">Just... a key.</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- CORNER ACCENTS -->
  <!-- ══════════════════════════════════════════ -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#f0c040" stroke-width="1.5" opacity="0.9"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#f0c040" stroke-width="1.5" opacity="0.9"/>
  <line x1="1170" y1="30" x2="1120" y2="30" stroke="#f0c040" stroke-width="1.5" opacity="0.9"/>
  <line x1="1170" y1="30" x2="1170" y2="80" stroke="#f0c040" stroke-width="1.5" opacity="0.9"/>
  <line x1="30" y1="645" x2="80" y2="645" stroke="#f0c040" stroke-width="1.5" opacity="0.9"/>
  <line x1="30" y1="645" x2="30" y2="595" stroke="#f0c040" stroke-width="1.5" opacity="0.9"/>
  <line x1="1170" y1="645" x2="1120" y2="645" stroke="#f0c040" stroke-width="1.5" opacity="0.9"/>
  <line x1="1170" y1="645" x2="1170" y2="595" stroke="#f0c040" stroke-width="1.5" opacity="0.9"/>

  <!-- Watermark/brand -->
  <text x="600" y="660" font-family="'Courier New', monospace" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.2" letter-spacing="3">FLORIDA STATE DIGITAL — LOCAL COMMERCE REIMAGINED</text>
</svg>
